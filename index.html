<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LASUED Theatre Arts — Course Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--p1:#1E0035;--p2:#4A0082;--p3:#6B2FB0;--p4:#9B5FD0;--p5:#C9A8E8;
--g1:#A07010;--g2:#C9922E;--g3:#E8B94A;--g4:#FFF4DC;
--sv:#B8B8D0;--svl:#EAEAF5;--cr:#F8F5FF;--ww:#FFFDFF;
--dk:#150025;--mid:#4A1060;--mt:#8070A0;--br:#DDD0EE;
--su:#1F6B3A;--er:#B02020}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--dk);min-height:100vh}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--p4);border-radius:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;border:none;white-space:nowrap}
.btn-p{background:var(--p2);color:#fff}.btn-p:hover{background:var(--p1)}
.btn-g{background:linear-gradient(135deg,var(--g2),var(--g3));color:#fff}
.btn-o{background:transparent;border:1.5px solid var(--p2);color:var(--p2)}.btn-o:hover{background:var(--p2);color:#fff}
.btn-sv{background:linear-gradient(135deg,#C0C0D8,#A8A8C0);color:var(--p1)}
.btn-gh{background:transparent;border:1.5px solid var(--br);color:var(--mt)}.btn-gh:hover{background:var(--svl)}
.btn-d{background:var(--er);color:#fff}.btn-sm{padding:7px 13px;font-size:13px}.btn-full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
#notif{position:fixed;top:18px;right:18px;z-index:9999;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.2);display:none;animation:sIn .3s ease;max-width:340px}
#notif.show{display:block}.notif-ok{background:var(--su);color:#fff}.notif-err{background:var(--er);color:#fff}.notif-info{background:var(--p2);color:#fff}
@keyframes sIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.fg{margin-bottom:15px}.fg label{display:block;font-size:11.5px;font-weight:600;color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;background:var(--cr);color:var(--dk);outline:none;transition:all .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p2);background:#fff;box-shadow:0 0 0 3px rgba(74,0,130,.08)}
.fg textarea{resize:vertical;min-height:80px}
/* AUTH */
.auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
@media(max-width:780px){.auth{grid-template-columns:1fr}}
.auth-l{background:linear-gradient(160deg,var(--p1) 0%,var(--p2) 55%,var(--mid) 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 40px;color:#fff;position:relative;overflow:hidden}
.auth-l::after{content:'✦';position:absolute;bottom:30px;right:30px;font-size:120px;opacity:.04;color:var(--g3)}
.auth-logos{display:flex;gap:14px;align-items:center;margin-bottom:22px}
.alo{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.45);text-align:center;cursor:pointer;overflow:hidden;transition:all .2s}
.alo:hover{background:rgba(255,255,255,.18)}.alo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.gdiv{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--g3),transparent);margin:0 auto 18px}
.auth-l h1{font-size:24px;text-align:center;line-height:1.3;color:#fff;margin-bottom:6px}
.auth-l .inst{font-size:12px;color:rgba(255,255,255,.6);text-align:center;line-height:1.75}
.auth-feats{margin-top:26px;padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.05);max-width:255px;width:100%}
.auth-feats h3{font-size:13px;color:var(--g3);margin-bottom:8px}
.auth-feats li{list-style:none;font-size:12px;color:rgba(255,255,255,.7);padding:3px 0}
.auth-feats li::before{content:'◆ ';color:var(--g2);font-size:9px}
.auth-r{background:var(--ww);display:flex;align-items:center;justify-content:center;padding:60px 40px}
@media(max-width:780px){.auth-r{padding:40px 24px}.auth-l{padding:40px 24px;min-height:260px}}
.af{width:100%;max-width:390px}.af h2{font-size:30px;color:var(--p1);margin-bottom:5px}
.af .sub{color:var(--mt);font-size:13px;margin-bottom:24px}
.rrow{display:flex;gap:8px;margin-bottom:20px}.rr{flex:1;padding:9px;border:1.5px solid var(--br);border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;color:var(--mt)}.rr.on{border-color:var(--p2);background:var(--p2);color:#fff}
.asw{text-align:center;margin-top:14px;font-size:13px;color:var(--mt)}.asw span{color:var(--p2);cursor:pointer;font-weight:600}
.nbox{background:var(--g4);border:1px solid var(--g2);border-radius:8px;padding:11px 14px;font-size:12.5px;color:#7A5010;margin-bottom:15px}
.nbox.pur{background:rgba(74,0,130,.06);border-color:var(--p3);color:var(--mid)}
.fl{text-align:right;margin-top:-10px;margin-bottom:12px;font-size:12.5px}.fl span{color:var(--p2);cursor:pointer;font-weight:500}
/* PORTAL */
.portal{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
@media(max-width:880px){.portal{grid-template-columns:1fr}}
.sidebar{background:var(--p1);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:880px){.sidebar{display:none;position:fixed;inset:0;z-index:500;width:250px}}.sidebar.open{display:flex}
.sl{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sl-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--g2),var(--g3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sl-t h3{font-size:13px;color:#fff;line-height:1.2}.sl-t span{font-size:10px;color:rgba(255,255,255,.4)}
.sl-lg{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);align-items:center}
.sl-lgt{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,.35);overflow:hidden;flex-shrink:0;cursor:pointer}
.sl-lgt img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.snav{padding:13px 10px;flex:1}.ns{margin-bottom:18px}
.nst{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.32);padding:0 8px;margin-bottom:6px}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.68);margin-bottom:1px;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.07);color:#fff}.ni.on{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;font-weight:600}
.ni .bx{margin-left:auto;background:var(--er);color:#fff;font-size:9px;padding:2px 6px;border-radius:10px}
.sftr{padding:12px 10px;border-top:1px solid rgba(255,255,255,.08)}
.uchip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;background:rgba(255,255,255,.06)}
.uav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g3));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--p1);flex-shrink:0}
.uinfo h4{font-size:13px;color:#fff;line-height:1.2}.uinfo span{font-size:10px;color:rgba(255,255,255,.4);text-transform:capitalize}
.main{overflow:auto}
.topbar{background:#fff;border-bottom:1px solid var(--br);padding:14px 26px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(74,0,130,.06)}
.topbar h2{font-size:20px;color:var(--p1);flex:1}
.mb{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--p2);padding:4px}
@media(max-width:880px){.mb{display:block}}
.sbar{display:flex;align-items:center;gap:7px;background:var(--cr);border:1.5px solid var(--br);border-radius:8px;padding:7px 12px}
.sbar input{border:none;background:transparent;font-size:13.5px;outline:none;width:150px;color:var(--dk)}
.content{padding:26px}@media(max-width:600px){.content{padding:14px}}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}}
.sc{background:#fff;border:1px solid var(--br);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.purple::before{background:linear-gradient(90deg,var(--p2),var(--p4))}.sc.gold::before{background:linear-gradient(90deg,var(--g1),var(--g3))}
.sc.silver::before{background:linear-gradient(90deg,#909090,#C0C0C0)}.sc.green::before{background:var(--su)}.sc.red::before{background:var(--er)}
.sc .sic{font-size:24px;margin-bottom:8px}.sc .sn{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--p2)}
.sc.gold .sn{color:var(--g1)}.sc .sl-{font-size:12px;color:var(--mt);margin-top:2px}
/* COURSES */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:800px){.cgrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:500px){.cgrid{grid-template-columns:1fr}}
.cc{background:#fff;border:1px solid var(--br);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s}
.cc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(74,0,130,.13)}
.cc-h{padding:18px 18px 14px;color:#fff;position:relative;min-height:90px}
.cc-h::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.3),transparent)}
.cc-h::after{content:attr(data-ic);position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:34px;opacity:.2}
.cc-code{font-size:11px;font-weight:600;opacity:.85;letter-spacing:.5px;margin-bottom:3px;position:relative}
.cc-h h3{font-size:15px;line-height:1.3;position:relative;font-family:'Cormorant Garamond',serif}
.cc-b{padding:12px 16px}.cc-m{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.lvl{background:rgba(74,0,130,.08);color:var(--p2);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.sts{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.sts-C{background:#E8F5E9;color:#1F6B3A}.sts-E{background:#FFF4DC;color:var(--g1)}.sts-R{background:#EDE7F6;color:var(--p2)}
.cc-f{padding:9px 16px;border-top:1px solid var(--br);display:flex;justify-content:space-between;font-size:11px;color:var(--mt)}
/* PANELS */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}.sh h3{font-size:20px;color:var(--p1)}
.panel{background:#fff;border:1px solid var(--br);border-radius:12px;padding:20px;margin-bottom:14px}
.panel h3{font-size:18px;color:var(--p1);margin-bottom:14px}
.prow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);font-size:13.5px;gap:10px}
.prow:last-child{border:none}.prow span:first-child{color:var(--mt)}.prow span:last-child{font-weight:500;text-align:right}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.g2{grid-template-columns:1fr}}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--p2);font-size:13px;cursor:pointer;margin-bottom:16px;font-weight:500}
.back:hover{text-decoration:underline}
.empty{text-align:center;padding:44px 20px;color:var(--mt)}.empty .ei{font-size:44px;margin-bottom:10px}.empty h4{font-size:18px;color:var(--mid);margin-bottom:5px}
/* COURSE HERO + TABS */
.chero{padding:26px;border-radius:14px;margin-bottom:20px;position:relative;overflow:hidden;color:#fff}
.chero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.3),transparent)}
.chero::after{content:attr(data-ic);position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:72px;opacity:.1}
.chero p.cl{font-size:11px;opacity:.75;margin-bottom:4px;position:relative}.chero h2{font-size:24px;margin-bottom:5px;position:relative;font-family:'Cormorant Garamond',serif}
.chero p.cm{font-size:13px;opacity:.68;position:relative}
.ctabs{display:flex;border-bottom:2px solid var(--br);margin-bottom:20px;overflow-x:auto;gap:0}
.ctab{padding:10px 17px;cursor:pointer;font-size:13px;font-weight:500;color:var(--mt);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.ctab.on{color:var(--p2);border-bottom-color:var(--p2);font-weight:600}.ctab:hover{color:var(--p2)}
/* FORUM */
.thread{background:#fff;border:1px solid var(--br);border-radius:12px;padding:17px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.thread:hover{border-color:var(--p3);box-shadow:0 3px 14px rgba(74,0,130,.07)}
.tmeta{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.tav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tav.student{background:var(--g4);color:var(--g1)}.tav.lecturer{background:var(--p2);color:#fff}
.tinfo h4{font-size:14px;font-weight:600;color:var(--dk);line-height:1.3}.tinfo .ts{font-size:11px;color:var(--mt);margin-top:2px}
.tbody{font-size:13px;color:#555;line-height:1.6}
.rbox{background:var(--cr);border-radius:10px;padding:14px;margin-top:13px}
.repl{border-left:3px solid var(--br);padding:9px 12px;margin-bottom:8px;border-radius:0 8px 8px 0;background:#fff}
.repl.lecturer{border-left-color:var(--p2)}.rau{font-size:11.5px;font-weight:600;color:var(--p2);margin-bottom:3px}.rb{font-size:13px;color:#444;line-height:1.5}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.tag-student{background:var(--g4);color:var(--g1)}.tag-lecturer{background:rgba(74,0,130,.1);color:var(--p2)}
.rep-ta{width:100%;padding:9px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;outline:none;resize:vertical;min-height:60px;transition:border .2s;color:var(--dk);background:#fff}
.rep-ta:focus{border-color:var(--p2)}
/* ASSIGNMENTS */
.acard{background:#fff;border:1px solid var(--br);border-radius:12px;padding:18px;margin-bottom:13px}
.ahead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px}
.atitle{font-size:15px;font-weight:600;color:var(--dk);font-family:'Cormorant Garamond',serif}
.ameta{font-size:12px;color:var(--mt);margin-top:2px}.due-b{background:var(--g4);color:var(--g1);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;flex-shrink:0}
.adesc{font-size:13px;color:#555;line-height:1.7}
.slist{margin-top:13px;border-top:1px solid var(--br);padding-top:12px}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);gap:8px;flex-wrap:wrap}
.sitem:last-child{border:none}.sname{font-size:13px;font-weight:500}.smeta{font-size:11px;color:var(--mt)}
.sub-ok{margin-top:11px;padding:10px 14px;background:#D4EFDF;border-radius:8px;font-size:12.5px;color:#1A6B3A;line-height:1.6}
/* GRADES */
.gc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px}
.gc.a{background:#D4EFDF;color:#1A6B3A}.gc.b{background:#D4E8F5;color:#1A507A}
.gc.c{background:var(--g4);color:var(--g1)}.gc.d{background:#FAE5D3;color:#8B3A1A}.gc.f{background:#FADBD8;color:#8B2020}.gc.p{background:var(--cr);color:var(--mt)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.22);margin:auto}
.modal h3{font-size:22px;color:var(--p1);margin-bottom:16px}.mftr{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.gprev{background:var(--cr);border:1px solid var(--br);border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:14px}
.gprev strong{color:var(--p2);font-size:18px}
/* RESULTS */
.rtw{overflow-x:auto;border-radius:12px;border:1px solid var(--br)}
.rtbl{width:100%;border-collapse:collapse}
.rtbl th{background:var(--p1);color:#fff;padding:11px 13px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.rtbl td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--br);background:#fff}
.rtbl tr:last-child td{border:none}.rtbl tr:hover td{background:var(--cr)}
/* ATTENDANCE */
.att-code-box{background:var(--p1);color:#fff;border-radius:16px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.att-code-box::before{content:'📋';position:absolute;right:20px;top:20px;font-size:60px;opacity:.08}
.att-code{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;letter-spacing:10px;color:var(--g3);margin:16px 0}
.att-code-label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px}
.att-code-tip{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px}
.att-status-open{display:inline-flex;align-items:center;gap:6px;background:rgba(31,107,58,.3);border:1px solid rgba(31,107,58,.5);color:#7FFFB0;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.att-status-closed{display:inline-flex;align-items:center;gap:6px;background:rgba(176,32,32,.3);color:#FFB0B0;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
.att-chip{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px}
.att-present{background:#D4EFDF;color:#1A6B3A}.att-late{background:#FEF3E2;color:var(--g1)}.att-absent{background:#FADBD8;color:#8B2020}.att-unmarked{background:var(--cr);color:var(--mt)}
.att-student-entry{background:linear-gradient(135deg,rgba(74,0,130,.06),rgba(74,0,130,.1));border:2px solid var(--p3);border-radius:14px;padding:24px;text-align:center;margin-bottom:20px}
.att-student-entry h3{font-size:22px;color:var(--p1);margin-bottom:8px}.att-student-entry p{font-size:13px;color:var(--mt);margin-bottom:18px}
.att-code-input{font-family:'Cormorant Garamond',serif;font-size:32px;letter-spacing:8px;text-align:center;background:#fff;border:2px solid var(--p2);border-radius:10px;padding:14px;color:var(--p1);text-transform:uppercase;width:100%;max-width:280px;outline:none}
.att-code-input:focus{box-shadow:0 0 0 4px rgba(74,0,130,.1)}
.att-reg-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);font-size:13px;gap:10px}
.att-reg-row:last-child{border:none}.att-reg-name{font-weight:500}.att-reg-meta{font-size:11px;color:var(--mt)}
.att-action-btns{display:flex;gap:6px;flex-wrap:wrap}
.att-sm{padding:5px 10px;font-size:12px;border-radius:6px;cursor:pointer;border:none;font-weight:600;transition:all .2s}
.att-sm-p{background:#D4EFDF;color:#1A6B3A}.att-sm-p:hover{background:#B8E0C8}
.att-sm-l{background:#FEF3E2;color:var(--g1)}.att-sm-l:hover{background:#FDEBD0}

function grade(s){
  if(s===null||s===undefined||s==="")return{l:"—",gp:"—",cl:"p"};
  s=parseInt(s);
  if(s>=70)return{l:"A",gp:"5.0",cl:"a"};if(s>=60)return{l:"B",gp:"4.0",cl:"b"};
  if(s>=50)return{l:"C",gp:"3.0",cl:"c"};if(s>=45)return{l:"D",gp:"2.0",cl:"d"};
  return{l:"F",gp:"0.0",cl:"f"};
}

function saveFeedback(code,aid,student){
  if(S.role!=="lecturer"){notify("Access denied — lecturer only.","err");return;}
  const text=document.getElementById("fb-text-in")?.value.trim();
  if(!text){notify("Write corrections first","err");return;}
  const k=ck(code);
  if(!S.data.feedback)S.data.feedback={};
  if(!S.data.feedback[k])S.data.feedback[k]=[];
  const existing=S.data.feedback[k].findIndex(f=>f.assignId===aid&&f.student===student);
  const entry={assignId:aid,student,corrections:text,updatedAt:dateNow()};
  if(existing>=0)S.data.feedback[k][existing]=entry;else S.data.feedback[k].push(entry);
  ss("feedback-"+k,S.data.feedback[k]);closeM();render();notify("Corrections saved for "+student+".");
}

async function doLogin(){
  try {
    if(!fbReady){alert("Firebase is not connected. Check your internet connection and reload the page.");return;}
    
    var emEl = document.getElementById("l-em");
    var pwEl = document.getElementById("l-pw");
    var em = emEl ? emEl.value.trim().toLowerCase() : "";
    var pw = pwEl ? pwEl.value : "";
    
    if(!em){alert("Please enter your email.");if(emEl)emEl.focus();return;}
    if(!pw){alert("Please enter your password.");if(pwEl)pwEl.focus();return;}
    
    var btn = document.querySelector("button[onclick=\"doLogin()\"]");
    var origBtnText = btn ? btn.textContent : "";
    if(btn){btn.textContent = "Signing in..."; btn.disabled = true;}
    
    // Step 1: Sign in with Firebase Auth
    var cred;
    try {
      cred = await fbAuth.signInWithEmailAndPassword(em, pw);
    } catch(authErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      var msg = authErr.message;
      if(authErr.code === "auth/wrong-password" || authErr.code === "auth/invalid-credential" || authErr.code === "auth/invalid-login-credentials") {
        msg = "Email or password is incorrect.";
      } else if(authErr.code === "auth/user-not-found") {
        msg = "No account found with that email.\n\nIf you have not registered yet, click \"Create your account\".";
      } else if(authErr.code === "auth/network-request-failed") {
        msg = "Network error. Check your internet connection and try again.";
      } else if(authErr.code === "auth/too-many-requests") {
        msg = "Too many failed sign-in attempts. Please wait a few minutes and try again.";
      }
      alert("Sign-in error: " + msg);
      return;
    }
    
    var uid = cred.user.uid;
    
    // Step 2: Fetch user profile from Firestore
    var doc;
    try {
      doc = await fbDB.collection("users").doc(uid).get();
    } catch(dbErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      alert("Profile fetch failed: " + dbErr.message);
      return;
    }
    
    if(btn){btn.textContent = origBtnText; btn.disabled = false;}
    
    if(!doc.exists){
      alert("Account exists but profile not found. Please contact your lecturer.");
      await fbAuth.signOut();
      return;
    }
    
    S.user = doc.data();
    S.role = S.user.role || "student";
    S.pg = "dashboard";
    if(S.user.mustChange){S.pg = "profile"; alert("Welcome! Please change your default password now.");}
    render();
    
  } catch(err) {
    alert("Unexpected sign-in error: " + err.message);
    console.error(err);
  }
}
async function doRegister(){
  try {
    if(!fbReady){alert("Firebase is not connected. Check your internet connection and reload the page.");return;}
    
    var nameEl=document.getElementById("r-name");
    var matricEl=document.getElementById("r-matric");
    var emEl=document.getElementById("r-em");
    var pwEl=document.getElementById("r-pw");
    var saEl=document.getElementById("r-sa");
    
    var name = nameEl ? nameEl.value.trim() : "";
    var matric = matricEl ? matricEl.value.trim() : "";
    var em = emEl ? emEl.value.trim().toLowerCase() : "";
    var pw = pwEl ? pwEl.value : "";
    var sa = saEl ? saEl.value.trim().toLowerCase() : "";
    
    if(!name){alert("Please enter your full name.");if(nameEl)nameEl.focus();return;}
    if(!em){alert("Please enter your email address.");if(emEl)emEl.focus();return;}
    if(!em.includes("@")||!em.includes(".")){alert("Please enter a valid email address.");if(emEl)emEl.focus();return;}
    if(!pw){alert("Please enter a password.");if(pwEl)pwEl.focus();return;}
    if(pw.length<6){alert("Password must be at least 6 characters long.");if(pwEl)pwEl.focus();return;}
    
    var secAns = sa || matric.toLowerCase() || "password";
    var role = (em === LECTURER_EMAIL) ? "lecturer" : "student";
    
    // Show "creating..." message
    var btn = document.querySelector("button[onclick=\"doRegister()\"]");
    var origBtnText = btn ? btn.textContent : "";
    if(btn){btn.textContent = "Creating account..."; btn.disabled = true;}
    
    // Step 1: Create Firebase Auth account
    var cred;
    try {
      cred = await fbAuth.createUserWithEmailAndPassword(em, pw);
    } catch(authErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      var msg = authErr.message;
      if(authErr.code === "auth/email-already-in-use") msg = "This email is already registered. Please sign in instead, or use a different email.";
      else if(authErr.code === "auth/invalid-email") msg = "The email address is not valid.";
      else if(authErr.code === "auth/weak-password") msg = "Password is too weak. Use at least 6 characters.";
      else if(authErr.code === "auth/network-request-failed") msg = "Network error. Check your internet connection and try again.";
      alert("Registration error: " + msg);
      return;
    }
    
    var uid = cred.user.uid;
    
    // Step 2: Create Firestore user profile
    var profile = {
      id: uid,
      name: name,
      matric: matric,
      email: em,
      role: role,
      secA: secAns,
      mustChange: false,
      createdAt: Date.now()
    };
    
    try {
      await fbDB.collection("users").doc(uid).set(profile);
    } catch(dbErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      alert("Account created but profile save failed: " + dbErr.message + "\n\nPlease contact your lecturer to fix this.");
      return;
    }
    
    if(btn){btn.textContent = origBtnText; btn.disabled = false;}
    
    // Step 3: Set state and go to dashboard
    S.user = profile;
    S.role = role;
    S.pg = "dashboard";
    render();
    alert("✅ Welcome, " + name + "!\n\nYour account is created in the cloud. You can now sign in from any device with the same email and password.");
    
  } catch(err) {
    alert("Unexpected error: " + err.message);
    console.error(err);
  }
}

function genCode(){const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let c="";for(let i=0;i<6;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;}
function getActiveCode(sess){
  if(!sess||!sess.open)return null;
  const rotMs=2*60*1000; // rotate every 2 min
  const slot=Math.floor((Date.now()-sess.openedAt)/rotMs);
  if(!sess.codes)sess.codes={};
  if(!sess.codes[slot])sess.codes[slot]=genCode();
  return sess.codes[slot];
}
function isValidCode(sess,entered){
  if(!sess||!sess.open||!entered)return false;
  const rotMs=2*60*1000;const slot=Math.floor((Date.now()-sess.openedAt)/rotMs);
  if(!sess.codes)return entered===sess.code;
  // Accept current and previous slot (grace)
  return(sess.codes[slot]&&sess.codes[slot]===entered)||(slot>0&&sess.codes[slot-1]&&sess.codes[slot-1]===entered);
}
function secToNextRotate(sess){const rotMs=2*60*1000;const elapsed=(Date.now()-sess.openedAt)%rotMs;return Math.ceil((rotMs-elapsed)/1000);}
function startCodeTimer(code,sid){
  clearInterval(window._codeTimer);
  window._codeTimer=setInterval(()=>{
    const k=ck(code);const sess=(S.data.attendance[k]||[]).find(s=>s.id===sid);
    if(!sess||!sess.open){clearInterval(window._codeTimer);return;}
    const cur=getActiveCode(sess);
    saveAtt(code);
    const el=document.getElementById("live-code");const tel=document.getElementById("code-timer");
    if(el)el.textContent=cur||sess.code;
    if(tel){const r=secToNextRotate(sess);tel.textContent="Changes in: "+Math.floor(r/60)+":"+(r%60<10?"0":"")+r%60;}
  },1000);
}

function openAttSession(code){
  if(S.role!=="lecturer"){notify("Access denied — lecturer only.","err");return;}
  const topic=document.getElementById("att-topic").value.trim();
  const grace=parseInt(document.getElementById("att-grace").value)||10;
  const k=ck(code);
  // Close any previously open session first
  S.data.attendance[k]=S.data.attendance[k].map(s=>s.open?{...s,open:false,closedAt:Date.now()}:s);
  // Create new session with enrolled students pre-listed as Unmarked
  const enrolled=S.data.users.filter(u=>u.role==="student"&&ROSTER.find(r=>r.matric===u.matric&&r.course===code));
  // For courses with no ROSTER data, use general students or empty
  const records=enrolled.length>0?enrolled.map(u=>({student:u.name,matric:u.matric,status:null,time:null,selfMarked:false})):[];
  const sess={id:Date.now(),date:new Date().toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"}),
    topic:topic||"Class Session",code:genCode(),openedAt:Date.now(),graceMins:grace,open:true,closedAt:null,records};
  S.data.attendance[k].unshift(sess);
  saveAtt(code);render();startCodeTimer(code,sess.id);notify("Session opened! Show the rolling code to your class.");
}

function closeAttSession(code,sid){
  if(S.role!=="lecturer"){notify("Access denied — lecturer only.","err");return;}
  const k=ck(code);
  S.data.attendance[k]=S.data.attendance[k].map(s=>s.id===sid?{...s,open:false,closedAt:Date.now()}:s);
  saveAtt(code);render();notify("Session closed. Attendance saved.");
}

function markStudent(code,sid,student,status){
  if(S.role!=="lecturer"){notify("Access denied — lecturer only.","err");return;}
  const k=ck(code);
  S.data.attendance[k]=S.data.attendance[k].map(s=>{
    if(s.id!==sid)return s;
    const recs=s.records.map(r=>r.student===student?{...r,status,time:dateNow()}:r);
    // If student not in list, add them
    if(!s.records.find(r=>r.student===student)){
      recs.push({student,matric:S.data.users.find(u=>u.name===student)?.matric||"",status,time:dateNow(),selfMarked:false});
    }
    return{...s,records:recs};
  });
  saveAtt(code);render();
}

function addAbsentees(code,sid){
  // Mark all still-null as absent
  const k=ck(code);
  S.data.attendance[k]=S.data.attendance[k].map(s=>{
    if(s.id!==sid)return s;
    return{...s,records:s.records.map(r=>r.status===null?{...r,status:"absent",time:dateNow()}:r)};
  });
  saveAtt(code);render();notify("All unmarked students marked Absent.");
}

// STUDENT: enter session code to self-mark
function studentMarkAtt(code){
  const entered=(document.getElementById("att-code-in")||{}).value?.trim().toUpperCase();
  if(!entered){notify("Please enter the session code","err");return;}
  const k=ck(code);
  const sess=S.data.attendance[k].find(s=>s.open&&s.code===entered);
  if(!sess){notify("Invalid or expired code. Check the code shown by your lecturer.","err");return;}
  // Check already marked
  const existing=sess.records.find(r=>r.student===S.user.name);
  if(existing&&existing.status){notify("You have already marked your attendance for this session.","err");return;}
  // Determine Present or Late
  const elapsed=(Date.now()-sess.openedAt)/1000/60;
  const status=elapsed<=sess.graceMins?"present":"late";
  // Mark
  S.data.attendance[k]=S.data.attendance[k].map(s=>{
    if(s.id!==sess.id)return s;
    let found=false;
    const recs=s.records.map(r=>{
      if(r.student===S.user.name){found=true;return{...r,status,time:dateNow(),selfMarked:true};}
      return r;
    });
    if(!found)recs.push({student:S.user.name,matric:S.user.matric||"",status,time:dateNow(),selfMarked:true});
    return{...s,records:recs};
  });
  saveAtt(code);render();
  if(status==="present")notify("✅ Attendance marked — PRESENT. You are on time.");
  else notify("🕐 Attendance marked — LATE. ("+Math.round(elapsed)+" min after session opened)","info");
}

function getMyAttSummary(code){
  const sessions=S.data.attendance[ck(code)]||[];
  const name=S.user?.name;
  return sessions.filter(s=>!s.open).map(s=>{
    const r=s.records.find(x=>x.student===name);
    return{date:s.date,topic:s.topic,status:r?.status||"absent",time:r?.time||"—"};
  });
}

function rCAttendance(c){
  const k=ck(c.code);const sessions=S.data.attendance[k]||[];
  const isLec=S.role==="lecturer";
  const openSess=sessions.find(s=>s.open);
  // Get enrolled students for this course from roster
  const enrolled=ROSTER.filter(r=>r.course===c.code);

  if(isLec){
    return `<div>
    ${openSess?`
    <!-- KIOSK MODE: Student self-check-in form -->
    <div style="background:#FFF8E1;border:2px solid #FFB300;border-radius:14px;padding:20px;margin-bottom:20px">
      <h3 style="color:#7A4400;margin-bottom:10px">📱 Pass-Around Sign-In</h3>
      <p style="font-size:13px;color:#8B6500;margin-bottom:12px">Pass this device to each student. They type their name and the code, then click Mark Me Present. Form auto-clears for the next student.</p>
      <div class="g2">
        <div class="fg" style="margin-bottom:8px"><label style="font-size:12px">Student Name or Matric Number</label><input id="kiosk-name" placeholder="Type your name or matric number" autofocus style="font-size:15px"></div>
        <div class="fg" style="margin-bottom:8px"><label style="font-size:12px">Session Code (6 chars)</label><input id="kiosk-code" maxlength="6" placeholder="e.g. AB12CD" style="font-size:15px;text-transform:uppercase;letter-spacing:3px;font-weight:600"></div>
      </div>
      <button class="btn btn-p btn-full" onclick="kioskMark('${c.code}')" style="font-size:16px;padding:12px">✅ Mark Me Present</button>
    </div>
    
    <!-- ACTIVE SESSION CODE DISPLAY -->
    <div class="att-code-box">
      <div class="att-status-open"><span style="width:8px;height:8px;background:#7FFFB0;border-radius:50%;display:inline-block"></span> Session Open</div>
      <div class="att-code-label">Session Code — Show this to your class</div>
      <div class="att-code">${openSess.code}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6)">${openSess.date} · ${openSess.topic} · Grace period: ${openSess.graceMins} minutes</div>
      <div class="att-code-tip">✅ Present = within ${openSess.graceMins} min &nbsp;·&nbsp; 🕐 Late = after ${openSess.graceMins} min &nbsp;·&nbsp; Each student can only mark once</div>
    </div>
    <div class="sh">
      <h3 style="font-size:17px">Class Register — ${openSess.date}</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm" style="background:#D4EFDF;color:#1A6B3A" onclick="addAbsentees('${c.code}',${openSess.id})">Mark Remaining Absent</button>
        <button class="btn btn-d btn-sm" onclick="closeAttSession('${c.code}',${openSess.id})">Close Session</button>
      </div>
    </div>
    ${rAttRegister(openSess,c.code,enrolled,true)}`:""}

    ${!openSess?`
    <!-- START NEW SESSION -->
    <div class="panel" style="border:1.5px solid var(--p3);margin-bottom:20px">
      <h3>📋 Open Attendance Session</h3>
      <p style="font-size:13px;color:var(--mt);margin-bottom:14px">A unique 6-character code will be generated. Show it to your class. Students have <strong>${CFG.graceMins} minutes</strong> to mark Present; after that they are marked Late.</p>
      <div class="g2">
        <div class="fg"><label>Class Topic / Week</label><input id="att-topic" placeholder="e.g. Week 5 — Narrative Voice"></div>
        <div class="fg"><label>Grace Period (minutes)</label><input id="att-grace" type="number" value="${CFG.graceMins}" min="5" max="30"></div>
      </div>
      <button class="btn btn-p" onclick="openAttSession('${c.code}')">🔓 Open Session &amp; Generate Code</button>
    </div>`:""}

    <!-- PAST SESSIONS -->
    ${sessions.filter(s=>!s.open).length>0?`
    <div class="sh"><h3 style="font-size:17px">Past Sessions</h3></div>
    ${sessions.filter(s=>!s.open).map(s=>{
      const pres=s.records.filter(r=>r.status==="present").length;
      const late=s.records.filter(r=>r.status==="late").length;
      const abs=s.records.filter(r=>r.status==="absent").length;
      return `<div class="att-summary-card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <div><div style="font-size:15px;font-weight:600;color:var(--dk)">${s.date} — ${s.topic}</div>
          <div style="font-size:12px;color:var(--mt)">Code: <strong>${s.code}</strong> · ${s.records.length} students</div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span class="att-chip att-present">✅ ${pres} Present</span>
            <span class="att-chip att-late">🕐 ${late} Late</span>
            <span class="att-chip att-absent">❌ ${abs} Absent</span>
          </div>
        </div>
        <details style="margin-top:12px">
          <summary style="font-size:13px;cursor:pointer;color:var(--p2);font-weight:500">View full register ▾</summary>
          <div style="margin-top:10px">${rAttRegister(s,c.code,enrolled,false)}</div>
        </details>
      </div>`;}).join("")}
    `:""}
    ${sessions.length===0?`<div class="empty"><div class="ei">📋</div><h4>No sessions yet</h4><p>Open your first session above to begin taking attendance.</p></div>`:""}
    </div>`;
  } else {
    // STUDENT VIEW
    const myRecords=sessions.map(s=>{const r=s.records.find(x=>x.student===S.user?.name);return{...s,myStatus:r?.status||null,myTime:r?.time||"—"};});
    const totalSess=sessions.filter(s=>!s.open).length;
    const myPres=myRecords.filter(s=>!s.open&&s.myStatus==="present").length;
    const myLate=myRecords.filter(s=>!s.open&&s.myStatus==="late").length;
    const myAbs=myRecords.filter(s=>!s.open&&s.myStatus==="absent").length;
    return `<div>
    ${openSess?`
    <div class="att-student-entry">
      <h3>📋 Attendance Open</h3>
      <p><strong>${openSess.date} — ${openSess.topic}</strong><br>Enter the code shown by your lecturer to mark your attendance.<br>You have <strong>${openSess.graceMins} minutes</strong> from when the session opened to be marked Present.</p>
      ${openSess.records.find(r=>r.student===S.user?.name&&r.status)?
        `<div style="margin:16px 0"><span class="att-chip ${openSess.records.find(r=>r.student===S.user?.name).status==="present"?"att-present":"att-late"}" style="font-size:14px;padding:8px 18px">
          ${openSess.records.find(r=>r.student===S.user?.name).status==="present"?"✅ PRESENT":"🕐 LATE"}</span>
          <p style="font-size:12px;color:var(--mt);margin-top:8px">Attendance marked at ${openSess.records.find(r=>r.student===S.user?.name).time}</p></div>` :
        `<div style="margin:16px 0">
          <input class="att-code-input" id="att-code-in" maxlength="6" placeholder="· · · · · ·" style="display:block;margin:0 auto 14px">
          <button class="btn btn-p" onclick="studentMarkAtt('${c.code}')">Mark My Attendance</button>
        </div>
        <p style="font-size:12px;color:rgba(74,0,130,.5)">🔒 Anti-proxy: Each account can mark only once. Your identity is tied to your login.</p>`}
    </div>`:`<div class="nbox pur" style="margin-bottom:20px">ℹ️ No attendance session is currently open for this course. Sessions are opened by your lecturer at the start of class.</div>`}
    <div class="panel">
      <h3>My Attendance Summary — ${c.code}</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
        <span class="att-chip att-present">✅ Present: ${myPres}</span>
        <span class="att-chip att-late">🕐 Late: ${myLate}</span>
        <span class="att-chip att-absent">❌ Absent: ${myAbs}</span>
        <span class="att-chip att-unmarked">Total: ${totalSess} sessions</span>
        ${totalSess>0?`<span class="att-chip" style="background:rgba(74,0,130,.1);color:var(--p2)">Attendance: ${Math.round(((myPres+myLate)/totalSess)*100)}%</span>`:""}
      </div>
      ${myRecords.filter(s=>!s.open).map(s=>`<div class="att-reg-row">
        <div><div class="att-reg-name">${s.date} — ${s.topic}</div></div>
        <span class="att-chip ${s.myStatus==="present"?"att-present":s.myStatus==="late"?"att-late":s.myStatus==="absent"?"att-absent":"att-unmarked"}">${s.myStatus?s.myStatus.toUpperCase():"—"}</span>
      </div>`).join("")}
      ${totalSess===0?`<p style="font-size:13px;color:var(--mt)">No completed sessions yet.</p>`:""}
    </div></div>`;
  }
}

function rAttRegister(sess,code,enrolled,isOpen){
  const allRecords=[...sess.records];
  // Add enrolled students not in records yet
  enrolled.forEach(s=>{if(!allRecords.find(r=>r.student===s.name))allRecords.push({student:s.name,matric:s.matric,status:null,selfMarked:false,time:null});});
  if(allRecords.length===0)return`<p style="font-size:13px;color:var(--mt)">No students enrolled. Upload student lists to populate the register.</p>`;
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
    <thead><tr style="background:var(--cr)">
      ${["Student","Matric","Status","Time",""].map(h=>`<th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--mt);text-transform:uppercase;white-space:nowrap">${h}</th>`).join("")}
    </tr></thead>
    <tbody>
    ${allRecords.map(r=>`<tr style="border-top:1px solid var(--br)">
      <td style="padding:8px 12px;font-size:13px;font-weight:500">${r.student}${r.selfMarked?`<span style="font-size:10px;color:var(--su);margin-left:5px">📱self</span>`:""}</td>
      <td style="padding:8px 12px;font-size:12px;color:var(--mt)">${r.matric||"—"}</td>
      <td style="padding:8px 12px"><span class="att-chip ${r.status==="present"?"att-present":r.status==="late"?"att-late":r.status==="absent"?"att-absent":"att-unmarked"}">${r.status?r.status.toUpperCase():"Unmarked"}</span></td>
      <td style="padding:8px 12px;font-size:12px;color:var(--mt)">${r.time||"—"}</td>
      <td style="padding:8px 12px">${isOpen?`<div class="att-action-btns">
        <button class="att-sm att-sm-p" onclick="markStudent('${code}',${sess.id},'${r.student.replace(/'/g,"\\'")}','present')">P</button>
        <button class="att-sm att-sm-l" onclick="markStudent('${code}',${sess.id},'${r.student.replace(/'/g,"\\'")}','late')">L</button>
        <button class="att-sm att-sm-a" onclick="markStudent('${code}',${sess.id},'${r.student.replace(/'/g,"\\'")}','absent')">A</button>
      </div>`:""}</td>
    </tr>`).join("")}
    </tbody>
  </table></div>`;
}

function rAttPage(){
  const isLec=S.role==="lecturer";
  return `<div>
  <div class="cf">${COURSES.map(c=>`<div class="cf-btn ${S.attCourse===c.code?"on":""}" onclick="S.attCourse='${c.code}';render()">${c.code}</div>`).join("")}</div>
  ${(()=>{const c=cobj(S.attCourse);if(!c)return"";

// ── KIOSK MODE: Mark attendance by name/matric lookup (no login needed) ────
function kioskMark(courseCode){
  try {
    var nameEl = document.getElementById("kiosk-name");
    var codeEl = document.getElementById("kiosk-code");
    if(!nameEl || !codeEl){ alert("Form fields missing"); return; }
    
    var nameOrMatric = nameEl.value.trim();
    var enteredCode = codeEl.value.trim().toUpperCase();
    
    if(!nameOrMatric){ alert("Please enter the student name or matric number"); nameEl.focus(); return; }
    if(!enteredCode){ alert("Please enter the session code"); codeEl.focus(); return; }
    
    var k = ck(courseCode);
    var sess = (S.data.attendance[k]||[]).find(function(s){ return s.open && s.code === enteredCode; });
    if(!sess){ alert("Invalid or expired code. Check the code displayed by the lecturer."); return; }
    
    // Find student by matric OR by name (case insensitive)
    var nameLower = nameOrMatric.toLowerCase();
    var student = S.data.users.find(function(u){ 
      return u.role === "student" && (
        u.matric === nameOrMatric || 
        (u.name && u.name.toLowerCase().includes(nameLower)) ||
        (u.matric && u.matric.toLowerCase() === nameLower)
      );
    });
    
    var studentName, studentMatric;
    if(student){
      studentName = student.name;
      studentMatric = student.matric;
    } else {
      // Allow walk-ins - use what they typed
      studentName = nameOrMatric;
      studentMatric = "";
    }
    
    // Check if already marked
    var existing = sess.records.find(function(r){ 
      return r.student === studentName || (studentMatric && r.matric === studentMatric); 
    });
    if(existing && existing.status){ 
      alert(studentName + " has already marked attendance for this session."); 
      nameEl.value = ""; codeEl.value = ""; nameEl.focus();
      return; 
    }
    
    // Determine status
    var elapsed = (Date.now() - sess.openedAt) / 1000 / 60;
    var status = elapsed <= sess.graceMins ? "present" : "late";
    
    // Mark the student
    S.data.attendance[k] = S.data.attendance[k].map(function(s){
      if(s.id !== sess.id) return s;
      var found = false;
      var recs = s.records.map(function(r){
        if(r.student === studentName || (studentMatric && r.matric === studentMatric)){
          found = true;
          return Object.assign({}, r, {status:status, time:dateNow(), selfMarked:true});
        }
        return r;
      });
      if(!found) recs.push({student:studentName, matric:studentMatric, status:status, time:dateNow(), selfMarked:true});
      return Object.assign({}, s, {records:recs});
    });
    
    saveAtt(courseCode);
    
    // Clear form for next student
    nameEl.value = ""; 
    codeEl.value = "";
    
    // Show confirmation
    var msg = "✅ " + studentName + " marked " + status.toUpperCase();
    if(status === "late") msg += " (" + Math.round(elapsed) + " min late)";
    alert(msg + "\n\nReady for next student. Pass the device.");
    
    render();
    setTimeout(function(){ var n = document.getElementById("kiosk-name"); if(n) n.focus(); }, 100);
  } catch(err){
    alert("Error: " + err.message);
  }
}
// ── END KIOSK MODE ──────────────────────────────────────────────────────────

function render(){
  const app=document.getElementById("app");
  if(!app){return;}
  if(S.pg==="login"){app.innerHTML=rLogin();return;}
  if(S.pg==="register"){app.innerHTML=rRegister();return;}
  if(S.pg==="forgot"){app.innerHTML=rForgot();return;}
  // Set portal structure with explicit viewport-relative sizing
  const vw=window.innerWidth||document.documentElement.clientWidth||1280;
  const sw=250, mw=vw-sw;
  app.innerHTML='<div id="PT" style="display:flex;flex-direction:row;width:'+vw+'px;min-height:100vh;position:relative"><div id="SB" style="width:'+sw+'px;min-width:'+sw+'px;max-width:'+sw+'px;min-height:100vh;background:var(--p1);color:#fff;overflow-y:auto;flex-shrink:0"></div><div id="MN" style="width:'+mw+'px;min-height:100vh;overflow-y:auto;overflow-x:hidden;flex:1"></div></div>';
  const sbEl=document.getElementById("SB");
  const mnEl=document.getElementById("MN");
  if(sbEl) sbEl.innerHTML=rSidebar();
  if(mnEl) mnEl.innerHTML=rMain();
}

if(fbReady && fbAuth){
  fbAuth.onAuthStateChanged(async function(user){
    if(user && (S.pg === "login" || !S.user)){
      try {
        var doc = await fbDB.collection("users").doc(user.uid).get();
        if(doc.exists){
          S.user = doc.data();
          S.role = S.user.role || "student";
          S.pg = "dashboard";
          render();
          console.log("✓ Session restored for", S.user.name);
        }
      } catch(err){
        console.error("Session restore error:",err);
      }
    }
  });
}

loadAll();render();});

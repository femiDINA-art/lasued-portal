// ── KIOSK MODE: Mark attendance by name/matric lookup (lecturer's device passed around) ────
async function kioskMark(courseCode){
  try {
    var nameEl = document.getElementById("kiosk-name");
    var codeEl = document.getElementById("kiosk-code");
    if(!nameEl || !codeEl){ alert("Form fields missing"); return; }
    
    var nameOrMatric = nameEl.value.trim();
    var enteredCode = codeEl.value.trim().toUpperCase();
    
    if(!nameOrMatric){ alert("Please enter the student name or matric number"); nameEl.focus(); return; }
    if(!enteredCode){ alert("Please enter the session code"); codeEl.focus(); return; }
    
    var k = ck(courseCode);
    var sess = (S.data.attendance[k]||[]).find(function(s){ return s.open; });
    if(!sess){ alert("No open session found. Open an attendance session first."); return; }
    if(!isValidCode(sess, enteredCode)){ alert("Invalid or expired code. Check the code displayed by the lecturer."); return; }
    
    // Find student by matric OR by name (case insensitive)
    var nameLower = nameOrMatric.toLowerCase();
    var student = S.data.users.find(function(u){ 
      return u.role === "student" && (
        u.matric === nameOrMatric || 
        (u.name && u.name.toLowerCase().includes(nameLower)) ||
        (u.matric && u.matric.toLowerCase() === nameLower)
      );
    });
    // Also check ROSTER if not in S.data.users
    if(!student){
      var rEntry = ROSTER.find(function(r){
        return r.course===courseCode && (r.matric===nameOrMatric || r.name.toLowerCase().includes(nameLower));
      });
      if(rEntry) student = {name:rEntry.name, matric:rEntry.matric};
    }
    
    var studentName, studentMatric;
    if(student){
      studentName = student.name;
      studentMatric = student.matric;
    } else {
      studentName = nameOrMatric;
      studentMatric = "";
    }
    
    // Check if already marked
    var existing = (sess.records||[]).find(function(r){ 
      return r.student === studentName || (studentMatric && r.matric === studentMatric); 
    });
    if(existing && existing.status){ 
      alert(studentName + " has already marked attendance for this session."); 
      nameEl.value = ""; codeEl.value = ""; nameEl.focus();
      return; 
    }
    
    var elapsed = (Date.now() - sess.openedAt) / 1000 / 60;
    var status = elapsed <= sess.graceMins ? "present" : "late";
    var mark = {student:studentName, matric:studentMatric, status:status, time:dateNow(), selfMarked:true};
    
    // Write to Firestore
    if(fbReady && fbDB){
      try{
        var key = studentMatric || ("k_" + studentName.replace(/\W/g,"_"));
        await fbDB.collection("att_sessions").doc(attDocId(k, sess.id)).update({["marks."+key]: mark});
      }catch(fe){ console.warn("Firestore kiosk mark failed:", fe); }
    }
    
    // Update local state
    S.data.attendance[k] = S.data.attendance[k].map(function(s){
      if(s.id !== sess.id) return s;
      var found = false;
      var recs = (s.records||[]).map(function(r){
        if(r.student === studentName || (studentMatric && r.matric === studentMatric)){
          found = true;
          return Object.assign({}, r, mark);
        }
        return r;
      });
      if(!found) recs.push(mark);
      return Object.assign({}, s, {records:recs});
    });
    
    saveAtt(courseCode);
    
    nameEl.value = ""; codeEl.value = "";
    
    var msg = "✅ " + studentName + " marked " + status.toUpperCase();
    if(status === "late") msg += " (" + Math.round(elapsed) + " min late)";
    alert(msg + "\n\nReady for next student. Pass the device.");
    
    render();
    setTimeout(function(){ var n = document.getElementById("kiosk-name"); if(n) n.focus(); }, 100);
  } catch(err){
    alert("Error: " + err.message);
  }
}
// ── END KIOSK MODE ──────────────────────────────────────────────────────────

function render(){
  const app=document.getElementById("app");
  if(!app){return;}
  if(S.pg==="login"){app.innerHTML=rLogin();return;}
  if(S.pg==="register"){app.innerHTML=rRegister();return;}
  if(S.pg==="forgot"){app.innerHTML=rForgot();return;}
  // Set portal structure with explicit viewport-relative sizing
  const vw=window.innerWidth||document.documentElement.clientWidth||1280;
  const sw=250, mw=vw-sw;
  app.innerHTML='<div id="PT" style="display:flex;flex-direction:row;width:'+vw+'px;min-height:100vh;position:relative"><div id="SB" style="width:'+sw+'px;min-width:'+sw+'px;max-width:'+sw+'px;min-height:100vh;background:var(--p1);color:#fff;overflow-y:auto;flex-shrink:0"></div><div id="MN" style="width:'+mw+'px;min-height:100vh;overflow-y:auto;overflow-x:hidden;flex:1"></div></div>';
  const sbEl=document.getElementById("SB");
  const mnEl=document.getElementById("MN");
  if(sbEl) sbEl.innerHTML=rSidebar();
  if(mnEl) mnEl.innerHTML=rMain();
  // Auto-start attendance code timer if we're displaying an open session
  if(S.role==="lecturer" && (S.pg==="course"||S.pg==="attendance") && S.course){
    const k=ck(S.course);
    const openSess=(S.data.attendance[k]||[]).find(s=>s.open);
    if(openSess && document.getElementById("live-code")){
      startCodeTimer(S.course, openSess.id);
    }
  }
}

      } catch(err){

      }

// ════════════════════════════════════════════════════════════════════════════
// FIRESTORE REAL-TIME LISTENERS (Milestone C: Announcements)
// ════════════════════════════════════════════════════════════════════════════
let fbAnnUnsub = null;
function startAnnListener(){
  if(!fbReady || !fbDB || !S.user) return;
  if(fbAnnUnsub){ try{fbAnnUnsub();}catch(e){} fbAnnUnsub = null; }
  fbAnnUnsub = fbDB.collection("announcements")
    .orderBy("createdAt","desc")
    .onSnapshot(function(snapshot){
      const anns = [];
      snapshot.forEach(function(doc){
        anns.push(doc.data());
      });
      S.data.announcements = anns;
      if(S.pg==="dashboard" || S.pg==="announcements"){
        render();
      }
      console.log("✓ Announcements synced:", anns.length);
    }, function(err){
      console.error("Ann listener error:", err);
    });
}

// ════════════════════════════════════════════════════════════════════════════
// FIRESTORE REAL-TIME LISTENERS (Milestone D: Attendance)
// ════════════════════════════════════════════════════════════════════════════
let _attListeners = {};

function startAttListeners(){
  if(!fbReady || !fbDB || !S.user) return;
  COURSES.forEach(function(course){
    const k = ck(course.code);
    if(_attListeners[k]) return; // already listening
    const unsub = fbDB.collection("att_sessions")
      .where("courseKey","==",k)
      .onSnapshot(function(snapshot){
        if(!S.data.attendance[k]) S.data.attendance[k] = [];
        snapshot.docChanges().forEach(function(change){
          const d = change.doc.data();
          const enrolled = enrolledForCourse(course.code);
          const records = marksToRecords(d.marks || {}, enrolled);
          const sess = {id:d.id, date:d.date, topic:d.topic, openedAt:d.openedAt,
            graceMins:d.graceMins, open:d.open, closedAt:d.closedAt, manual:d.manual||false, records};
          const idx = S.data.attendance[k].findIndex(s => s.id === d.id);
          if(change.type === "removed"){
            if(idx >= 0) S.data.attendance[k].splice(idx, 1);
          } else {
            if(idx >= 0) S.data.attendance[k][idx] = sess;
            else { S.data.attendance[k].unshift(sess); S.data.attendance[k].sort((a,b)=>b.id-a.id); }
          }
        });
        saveAtt(course.code);
        // Re-render if on attendance-related page
        const onAttPage = S.pg==="attendance" || (S.pg==="course" && S.tab==="attendance");
        if(onAttPage) render();
        console.log("✓ Attendance synced for", k);
      }, function(err){
        console.warn("Att listener error for " + k + ":", err);
      });
    _attListeners[k] = unsub;
  });
}

function stopAllListeners(){
  if(fbAnnUnsub){ try{fbAnnUnsub();}catch(e){} fbAnnUnsub = null; }
  Object.values(_attListeners).forEach(function(u){ try{u();}catch(e){} });
  _attListeners = {};
  if(fbTestsUnsub){try{fbTestsUnsub();}catch(e){}fbTestsUnsub=null;}
  if(fbSubsUnsub){try{fbSubsUnsub();}catch(e){}fbSubsUnsub=null;}
  if(fbQbankUnsub){try{fbQbankUnsub();}catch(e){}fbQbankUnsub=null;}
  if(fbScoresUnsub){try{fbScoresUnsub();}catch(e){}fbScoresUnsub=null;}
}


}

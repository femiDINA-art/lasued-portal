
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LASUED Theatre Arts — Course Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--p1:#1E0035;--p2:#4A0082;--p3:#6B2FB0;--p4:#9B5FD0;--p5:#C9A8E8;
--g1:#A07010;--g2:#C9922E;--g3:#E8B94A;--g4:#FFF4DC;
--sv:#B8B8D0;--svl:#EAEAF5;--cr:#F8F5FF;--ww:#FFFDFF;
--dk:#150025;--mid:#4A1060;--mt:#8070A0;--br:#DDD0EE;
--su:#1F6B3A;--er:#B02020}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--dk);min-height:100vh}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--p4);border-radius:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;border:none;white-space:nowrap}
.btn-p{background:var(--p2);color:#fff}.btn-p:hover{background:var(--p1)}
.btn-g{background:linear-gradient(135deg,var(--g2),var(--g3));color:#fff}
.btn-o{background:transparent;border:1.5px solid var(--p2);color:var(--p2)}.btn-o:hover{background:var(--p2);color:#fff}
.btn-sv{background:linear-gradient(135deg,#C0C0D8,#A8A8C0);color:var(--p1)}
.btn-gh{background:transparent;border:1.5px solid var(--br);color:var(--mt)}.btn-gh:hover{background:var(--svl)}
.btn-d{background:var(--er);color:#fff}.btn-sm{padding:7px 13px;font-size:13px}.btn-full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
#notif{position:fixed;top:18px;right:18px;z-index:9999;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.2);display:none;animation:sIn .3s ease;max-width:340px}
#notif.show{display:block}.notif-ok{background:var(--su);color:#fff}.notif-err{background:var(--er);color:#fff}.notif-info{background:var(--p2);color:#fff}
@keyframes sIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.fg{margin-bottom:15px}.fg label{display:block;font-size:11.5px;font-weight:600;color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;background:var(--cr);color:var(--dk);outline:none;transition:all .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p2);background:#fff;box-shadow:0 0 0 3px rgba(74,0,130,.08)}
.fg textarea{resize:vertical;min-height:80px}
/* AUTH */
.auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
@media(max-width:780px){.auth{grid-template-columns:1fr}}
.auth-l{background:linear-gradient(160deg,var(--p1) 0%,var(--p2) 55%,var(--mid) 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px 40px;color:#fff;position:relative;overflow:hidden}
.auth-l::after{content:'✦';position:absolute;bottom:30px;right:30px;font-size:120px;opacity:.04;color:var(--g3)}
.auth-logos{display:flex;gap:14px;align-items:center;margin-bottom:22px}
.alo{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.45);text-align:center;cursor:pointer;overflow:hidden;transition:all .2s}
.alo:hover{background:rgba(255,255,255,.18)}.alo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.gdiv{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--g3),transparent);margin:0 auto 18px}
.auth-l h1{font-size:24px;text-align:center;line-height:1.3;color:#fff;margin-bottom:6px}
.auth-l .inst{font-size:12px;color:rgba(255,255,255,.6);text-align:center;line-height:1.75}
.auth-feats{margin-top:26px;padding:16px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.05);max-width:255px;width:100%}
.auth-feats h3{font-size:13px;color:var(--g3);margin-bottom:8px}
.auth-feats li{list-style:none;font-size:12px;color:rgba(255,255,255,.7);padding:3px 0}
.auth-feats li::before{content:'◆ ';color:var(--g2);font-size:9px}
.auth-r{background:var(--ww);display:flex;align-items:center;justify-content:center;padding:60px 40px}
@media(max-width:780px){.auth-r{padding:40px 24px}.auth-l{padding:40px 24px;min-height:260px}}
.af{width:100%;max-width:390px}.af h2{font-size:30px;color:var(--p1);margin-bottom:5px}
.af .sub{color:var(--mt);font-size:13px;margin-bottom:24px}
.rrow{display:flex;gap:8px;margin-bottom:20px}.rr{flex:1;padding:9px;border:1.5px solid var(--br);border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;color:var(--mt)}.rr.on{border-color:var(--p2);background:var(--p2);color:#fff}
.asw{text-align:center;margin-top:14px;font-size:13px;color:var(--mt)}.asw span{color:var(--p2);cursor:pointer;font-weight:600}
.nbox{background:var(--g4);border:1px solid var(--g2);border-radius:8px;padding:11px 14px;font-size:12.5px;color:#7A5010;margin-bottom:15px}
.nbox.pur{background:rgba(74,0,130,.06);border-color:var(--p3);color:var(--mid)}
.fl{text-align:right;margin-top:-10px;margin-bottom:12px;font-size:12.5px}.fl span{color:var(--p2);cursor:pointer;font-weight:500}
/* PORTAL */
.portal{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
@media(max-width:880px){.portal{grid-template-columns:1fr}}
.sidebar{background:var(--p1);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:880px){.sidebar{display:none;position:fixed;inset:0;z-index:500;width:250px}}.sidebar.open{display:flex}
.sl{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sl-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--g2),var(--g3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sl-t h3{font-size:13px;color:#fff;line-height:1.2}.sl-t span{font-size:10px;color:rgba(255,255,255,.4)}
.sl-lg{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);align-items:center}
.sl-lgt{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,.35);overflow:hidden;flex-shrink:0;cursor:pointer}
.sl-lgt img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.snav{padding:13px 10px;flex:1}.ns{margin-bottom:18px}
.nst{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.32);padding:0 8px;margin-bottom:6px}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.68);margin-bottom:1px;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.07);color:#fff}.ni.on{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;font-weight:600}
.ni .bx{margin-left:auto;background:var(--er);color:#fff;font-size:9px;padding:2px 6px;border-radius:10px}
.sftr{padding:12px 10px;border-top:1px solid rgba(255,255,255,.08)}
.uchip{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;background:rgba(255,255,255,.06)}
.uav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g3));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--p1);flex-shrink:0}
.uinfo h4{font-size:13px;color:#fff;line-height:1.2}.uinfo span{font-size:10px;color:rgba(255,255,255,.4);text-transform:capitalize}
.main{overflow:auto}
.topbar{background:#fff;border-bottom:1px solid var(--br);padding:14px 26px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(74,0,130,.06)}
.topbar h2{font-size:20px;color:var(--p1);flex:1}
.mb{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--p2);padding:4px}
@media(max-width:880px){.mb{display:block}}
.sbar{display:flex;align-items:center;gap:7px;background:var(--cr);border:1.5px solid var(--br);border-radius:8px;padding:7px 12px}
.sbar input{border:none;background:transparent;font-size:13.5px;outline:none;width:150px;color:var(--dk)}
.content{padding:26px}@media(max-width:600px){.content{padding:14px}}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}}
.sc{background:#fff;border:1px solid var(--br);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.purple::before{background:linear-gradient(90deg,var(--p2),var(--p4))}.sc.gold::before{background:linear-gradient(90deg,var(--g1),var(--g3))}
.sc.silver::before{background:linear-gradient(90deg,#909090,#C0C0C0)}.sc.green::before{background:var(--su)}.sc.red::before{background:var(--er)}
.sc .sic{font-size:24px;margin-bottom:8px}.sc .sn{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--p2)}
.sc.gold .sn{color:var(--g1)}.sc .sl-{font-size:12px;color:var(--mt);margin-top:2px}
/* COURSES */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:800px){.cgrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:500px){.cgrid{grid-template-columns:1fr}}
.cc{background:#fff;border:1px solid var(--br);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s}
.cc:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(74,0,130,.13)}
.cc-h{padding:18px 18px 14px;color:#fff;position:relative;min-height:90px}
.cc-h::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.3),transparent)}
.cc-h::after{content:attr(data-ic);position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:34px;opacity:.2}
.cc-code{font-size:11px;font-weight:600;opacity:.85;letter-spacing:.5px;margin-bottom:3px;position:relative}
.cc-h h3{font-size:15px;line-height:1.3;position:relative;font-family:'Cormorant Garamond',serif}
.cc-b{padding:12px 16px}.cc-m{display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.lvl{background:rgba(74,0,130,.08);color:var(--p2);font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.sts{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.sts-C{background:#E8F5E9;color:#1F6B3A}.sts-E{background:#FFF4DC;color:var(--g1)}.sts-R{background:#EDE7F6;color:var(--p2)}
.cc-f{padding:9px 16px;border-top:1px solid var(--br);display:flex;justify-content:space-between;font-size:11px;color:var(--mt)}
/* PANELS */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}.sh h3{font-size:20px;color:var(--p1)}
.panel{background:#fff;border:1px solid var(--br);border-radius:12px;padding:20px;margin-bottom:14px}
.panel h3{font-size:18px;color:var(--p1);margin-bottom:14px}
.prow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--br);font-size:13.5px;gap:10px}
.prow:last-child{border:none}.prow span:first-child{color:var(--mt)}.prow span:last-child{font-weight:500;text-align:right}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.g2{grid-template-columns:1fr}}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--p2);font-size:13px;cursor:pointer;margin-bottom:16px;font-weight:500}
.back:hover{text-decoration:underline}
.empty{text-align:center;padding:44px 20px;color:var(--mt)}.empty .ei{font-size:44px;margin-bottom:10px}.empty h4{font-size:18px;color:var(--mid);margin-bottom:5px}
/* COURSE HERO + TABS */
.chero{padding:26px;border-radius:14px;margin-bottom:20px;position:relative;overflow:hidden;color:#fff}
.chero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.3),transparent)}
.chero::after{content:attr(data-ic);position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:72px;opacity:.1}
.chero p.cl{font-size:11px;opacity:.75;margin-bottom:4px;position:relative}.chero h2{font-size:24px;margin-bottom:5px;position:relative;font-family:'Cormorant Garamond',serif}
.chero p.cm{font-size:13px;opacity:.68;position:relative}
.ctabs{display:flex;border-bottom:2px solid var(--br);margin-bottom:20px;overflow-x:auto;gap:0}
.ctab{padding:10px 17px;cursor:pointer;font-size:13px;font-weight:500;color:var(--mt);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s}
.ctab.on{color:var(--p2);border-bottom-color:var(--p2);font-weight:600}.ctab:hover{color:var(--p2)}
/* FORUM */
.thread{background:#fff;border:1px solid var(--br);border-radius:12px;padding:17px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.thread:hover{border-color:var(--p3);box-shadow:0 3px 14px rgba(74,0,130,.07)}
.tmeta{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.tav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tav.student{background:var(--g4);color:var(--g1)}.tav.lecturer{background:var(--p2);color:#fff}
.tinfo h4{font-size:14px;font-weight:600;color:var(--dk);line-height:1.3}.tinfo .ts{font-size:11px;color:var(--mt);margin-top:2px}
.tbody{font-size:13px;color:#555;line-height:1.6}
.rbox{background:var(--cr);border-radius:10px;padding:14px;margin-top:13px}
.repl{border-left:3px solid var(--br);padding:9px 12px;margin-bottom:8px;border-radius:0 8px 8px 0;background:#fff}
.repl.lecturer{border-left-color:var(--p2)}.rau{font-size:11.5px;font-weight:600;color:var(--p2);margin-bottom:3px}.rb{font-size:13px;color:#444;line-height:1.5}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.tag-student{background:var(--g4);color:var(--g1)}.tag-lecturer{background:rgba(74,0,130,.1);color:var(--p2)}
.rep-ta{width:100%;padding:9px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;outline:none;resize:vertical;min-height:60px;transition:border .2s;color:var(--dk);background:#fff}
.rep-ta:focus{border-color:var(--p2)}
/* ASSIGNMENTS */
.acard{background:#fff;border:1px solid var(--br);border-radius:12px;padding:18px;margin-bottom:13px}
.ahead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px}
.atitle{font-size:15px;font-weight:600;color:var(--dk);font-family:'Cormorant Garamond',serif}
.ameta{font-size:12px;color:var(--mt);margin-top:2px}.due-b{background:var(--g4);color:var(--g1);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;flex-shrink:0}
.adesc{font-size:13px;color:#555;line-height:1.7}
.slist{margin-top:13px;border-top:1px solid var(--br);padding-top:12px}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);gap:8px;flex-wrap:wrap}
.sitem:last-child{border:none}.sname{font-size:13px;font-weight:500}.smeta{font-size:11px;color:var(--mt)}
.sub-ok{margin-top:11px;padding:10px 14px;background:#D4EFDF;border-radius:8px;font-size:12.5px;color:#1A6B3A;line-height:1.6}
/* GRADES */
.gc{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px}
.gc.a{background:#D4EFDF;color:#1A6B3A}.gc.b{background:#D4E8F5;color:#1A507A}
.gc.c{background:var(--g4);color:var(--g1)}.gc.d{background:#FAE5D3;color:#8B3A1A}.gc.f{background:#FADBD8;color:#8B2020}.gc.p{background:var(--cr);color:var(--mt)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.22);margin:auto}
.modal h3{font-size:22px;color:var(--p1);margin-bottom:16px}.mftr{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.gprev{background:var(--cr);border:1px solid var(--br);border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:14px}
.gprev strong{color:var(--p2);font-size:18px}
/* RESULTS */
.rtw{overflow-x:auto;border-radius:12px;border:1px solid var(--br)}
.rtbl{width:100%;border-collapse:collapse}
.rtbl th{background:var(--p1);color:#fff;padding:11px 13px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.rtbl td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--br);background:#fff}
.rtbl tr:last-child td{border:none}.rtbl tr:hover td{background:var(--cr)}
/* ATTENDANCE */
.att-code-box{background:var(--p1);color:#fff;border-radius:16px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.att-code-box::before{content:'📋';position:absolute;right:20px;top:20px;font-size:60px;opacity:.08}
.att-code{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:700;letter-spacing:10px;color:var(--g3);margin:16px 0}
.att-code-label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px}
.att-code-tip{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px}
.att-status-open{display:inline-flex;align-items:center;gap:6px;background:rgba(31,107,58,.3);border:1px solid rgba(31,107,58,.5);color:#7FFFB0;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.att-status-closed{display:inline-flex;align-items:center;gap:6px;background:rgba(176,32,32,.3);color:#FFB0B0;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
.att-chip{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px}
.att-present{background:#D4EFDF;color:#1A6B3A}.att-late{background:#FEF3E2;color:var(--g1)}.att-absent{background:#FADBD8;color:#8B2020}.att-unmarked{background:var(--cr);color:var(--mt)}
.att-student-entry{background:linear-gradient(135deg,rgba(74,0,130,.06),rgba(74,0,130,.1));border:2px solid var(--p3);border-radius:14px;padding:24px;text-align:center;margin-bottom:20px}
.att-student-entry h3{font-size:22px;color:var(--p1);margin-bottom:8px}.att-student-entry p{font-size:13px;color:var(--mt);margin-bottom:18px}
.att-code-input{font-family:'Cormorant Garamond',serif;font-size:32px;letter-spacing:8px;text-align:center;background:#fff;border:2px solid var(--p2);border-radius:10px;padding:14px;color:var(--p1);text-transform:uppercase;width:100%;max-width:280px;outline:none}
.att-code-input:focus{box-shadow:0 0 0 4px rgba(74,0,130,.1)}
.att-reg-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--br);font-size:13px;gap:10px}
.att-reg-row:last-child{border:none}.att-reg-name{font-weight:500}.att-reg-meta{font-size:11px;color:var(--mt)}
.att-action-btns{display:flex;gap:6px;flex-wrap:wrap}
.att-sm{padding:5px 10px;font-size:12px;border-radius:6px;cursor:pointer;border:none;font-weight:600;transition:all .2s}
.att-sm-p{background:#D4EFDF;color:#1A6B3A}.att-sm-p:hover{background:#B8E0C8}
.att-sm-l{background:#FEF3E2;color:var(--g1)}.att-sm-l:hover{background:#FDEBD0}

function grade(s){
  if(s===null||s===undefined||s==="")return{l:"—",gp:"—",cl:"p"};
  s=parseInt(s);
  if(s>=70)return{l:"A",gp:"5.0",cl:"a"};if(s>=60)return{l:"B",gp:"4.0",cl:"b"};
  if(s>=50)return{l:"C",gp:"3.0",cl:"c"};if(s>=45)return{l:"D",gp:"2.0",cl:"d"};
  return{l:"F",gp:"0.0",cl:"f"};
}

async function doLogin(){
  try {
    if(!fbReady){alert("Firebase is not connected. Check your internet connection and reload the page.");return;}
    
    var emEl = document.getElementById("l-em");
    var pwEl = document.getElementById("l-pw");
    var em = emEl ? emEl.value.trim().toLowerCase() : "";
    var pw = pwEl ? pwEl.value : "";
    
    if(!em){alert("Please enter your email.");if(emEl)emEl.focus();return;}
    if(!pw){alert("Please enter your password.");if(pwEl)pwEl.focus();return;}
    
    var btn = document.querySelector("button[onclick=\"doLogin()\"]");
    var origBtnText = btn ? btn.textContent : "";
    if(btn){btn.textContent = "Signing in..."; btn.disabled = true;}
    
    // Step 1: Sign in with Firebase Auth
    var cred;
    try {
      cred = await fbAuth.signInWithEmailAndPassword(em, pw);
    } catch(authErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      var msg = authErr.message;
      if(authErr.code === "auth/wrong-password" || authErr.code === "auth/invalid-credential" || authErr.code === "auth/invalid-login-credentials") {
        msg = "Email or password is incorrect.";
      } else if(authErr.code === "auth/user-not-found") {
        msg = "No account found with that email.\n\nIf you have not registered yet, click \"Create your account\".";
      } else if(authErr.code === "auth/network-request-failed") {
        msg = "Network error. Check your internet connection and try again.";
      } else if(authErr.code === "auth/too-many-requests") {
        msg = "Too many failed sign-in attempts. Please wait a few minutes and try again.";
      }
      alert("Sign-in error: " + msg);
      return;
    }
    
    var uid = cred.user.uid;
    
    // Step 2: Fetch user profile from Firestore
    var doc;
    try {
      doc = await fbDB.collection("users").doc(uid).get();
    } catch(dbErr){
      if(btn){btn.textContent = origBtnText; btn.disabled = false;}
      alert("Profile fetch failed: " + dbErr.message);
      return;
    }
    
    if(btn){btn.textContent = origBtnText; btn.disabled = false;}
    
    if(!doc.exists){
      alert("Account exists but profile not found. Please contact your lecturer.");
      await fbAuth.signOut();
      return;
    }
    
    S.user = doc.data();
    S.role = S.user.role || "student";
    S.pg = "dashboard";
    if(S.user.mustChange){S.pg = "profile"; alert("Welcome! Please change your default password now.");}
    render();
    startAnnListener();
    loadAttFromFirestore().then(function(){ startAttListeners(); });
    loadTestsFromFirestore().then(function(){
      loadTestSubsFromFirestore().then(function(){
        if(S.role==="lecturer")loadQbankFromFirestore().then(function(){startTestListeners();});
        else startTestListeners();
      });
    });
    loadScoresFromFirestore().then(function(){startScoresListener();});

  } catch(err) {
    alert("Unexpected sign-in error: " + err.message);
    console.error(err);
  }
}

// ── Deterministic rolling-code generator (no storage needed) ──
// Both lecturer device and student devices compute the same code
// independently from the session's openedAt timestamp.
function computeAttCode(openedAt, slot) {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = ((openedAt & 0x7FFFFFFF) * 31 + slot * 999983) & 0x7FFFFFFF;
  if (s === 0) s = 12345;
  for (let i = 0; i < 6; i++) { s = (s * 1664525 + 1013904223) & 0x7FFFFFFF; }
  let c = ""; let tmp = s;
  for (let i = 0; i < 6; i++) { tmp = (tmp * 1664525 + 1013904223) & 0x7FFFFFFF; c += chars[tmp % chars.length]; }
  return c;
}
function getAttSlot(openedAt) { return Math.floor((Date.now() - openedAt) / (2 * 60 * 1000)); }
function getActiveCode(sess) {
  if (!sess || !sess.open) return null;
  return computeAttCode(sess.openedAt, getAttSlot(sess.openedAt));
}
function isValidCode(sess, entered) {
  if (!sess || !sess.open || !entered) return false;
  const slot = getAttSlot(sess.openedAt);
  return entered === computeAttCode(sess.openedAt, slot) ||
         (slot > 0 && entered === computeAttCode(sess.openedAt, slot - 1));
}
function secToNextRotate(sess) {
  const rotMs = 2 * 60 * 1000;
  const elapsed = (Date.now() - sess.openedAt) % rotMs;
  return Math.ceil((rotMs - elapsed) / 1000);
}
function startCodeTimer(code, sid) {
  clearInterval(window._codeTimer);
  window._codeTimer = setInterval(() => {
    const k = ck(code);
    const sess = (S.data.attendance[k] || []).find(s => s.id === sid);
    if (!sess || !sess.open) { clearInterval(window._codeTimer); return; }
    const cur = getActiveCode(sess);
    const el = document.getElementById("live-code");
    const tel = document.getElementById("code-timer");
    if (el) el.textContent = cur || "------";
    if (tel) { const r = secToNextRotate(sess); tel.textContent = "Changes in: " + Math.floor(r/60) + ":" + (r%60<10?"0":"") + r%60; }
  }, 1000);
}

// ── Firebase Attendance Helpers ──────────────────────
function attDocId(k, id) { return "att_" + k + "_" + id; }

// Convert Firestore marks map {matric: markObj} → records array
function marksToRecords(marks, enrolled) {
  const result = [];
  const seen = new Set();
  enrolled.forEach(e => {
    const m = (marks || {})[e.matric];
    result.push(m ? {...m} : {student: e.student, matric: e.matric, status: null, time: null, selfMarked: false});
    seen.add(e.matric);
  });
  Object.entries(marks || {}).forEach(([mk, m]) => {
    const mat = m.matric || mk;
    if (!seen.has(mat)) { result.push({...m}); seen.add(mat); }
  });
  return result;
}

async function loadAttFromFirestore() {

      const d = doc.data();
      const k = d.courseKey; if (!k) return;
      if (!S.data.attendance[k]) S.data.attendance[k] = [];
      const course = COURSES.find(c => ck(c.code) === k);

      const idx = S.data.attendance[k].findIndex(s => s.id === d.id);

    }catch(e){console.warn("Firestore fetch for student mark failed:",e);}
  }
  const sess=firestoreSess||(S.data.attendance[k]||[]).find(s=>s.open);
  if(!sess){notify("No open session for this course. Ask your lecturer to open attendance.","err");return;}
  if(!isValidCode(sess,entered)){notify("Invalid or expired code. Check the code shown by your lecturer.","err");return;}

  const myMatric=S.user?.matric||"";
  if(firestoreSess&&myMatric&&firestoreSess.marks&&firestoreSess.marks[myMatric]?.status){
    notify("You have already marked your attendance for this session.","err");return;
  }
  const localSess=(S.data.attendance[k]||[]).find(s=>s.id===sess.id);
  if(localSess){
    const existing=localSess.records.find(r=>r.matric===myMatric||r.student===S.user?.name);
    if(existing&&existing.status){notify("You have already marked your attendance for this session.","err");return;}
  }
  const elapsed=(Date.now()-sess.openedAt)/1000/60;
  const status=elapsed<=sess.graceMins?"present":"late";
  const mark={student:S.user.name,matric:myMatric,status,time:dateNow(),selfMarked:true};
  // Write to Firestore
  if(fbReady&&fbDB){
    try{
      const docId=firestoreSess?._docId||attDocId(k,sess.id);
      const key=myMatric||("u_"+fbAuth.currentUser?.uid);
      await fbDB.collection("att_sessions").doc(docId).update({[`marks.${key}`]:mark});
      console.log("✓ Student attendance written to Firestore");
    }catch(e){
      notify("Connection error — could not save. Please try again.","err");
      console.error("Firestore student mark failed:",e);return;
    }
  }
  // Update local state
  if(!S.data.attendance[k])S.data.attendance[k]=[];
  const idx=S.data.attendance[k].findIndex(s=>s.id===sess.id);
  if(idx>=0){
    S.data.attendance[k][idx]={...S.data.attendance[k][idx],
      records:S.data.attendance[k][idx].records.map(r=>
        (r.matric===myMatric||r.student===S.user.name)?{...r,...mark}:r)};
    if(!S.data.attendance[k][idx].records.find(r=>r.matric===myMatric))
      S.data.attendance[k][idx].records.push(mark);
  } else {
    const enrolled=enrolledForCourse(code);
    S.data.attendance[k].unshift({id:sess.id,date:sess.date,topic:sess.topic,
      openedAt:sess.openedAt,graceMins:sess.graceMins,open:true,closedAt:null,manual:false,
      records:[...enrolled.map(e=>e.matric===myMatric?{...e,...mark}:{...e,status:null,time:null,selfMarked:false})]});
  }
  saveAtt(code);render();
  if(status==="present")notify("✅ Attendance marked — PRESENT. You are on time.");
  else notify("🕐 Attendance marked — LATE. ("+Math.round(elapsed)+" min after session opened)","info");
}

// ── Auto-Grading Engine ────────────────────────────────
function normalizeAnswer(s){
  if(s===null||s===undefined)return "";
  let str = String(s);
  // Strip diacritics (é→e, ṣ→s, ò→o, ñ→n, etc.)
  // Normalize to NFD and remove combining marks; then handle special non-decomposable chars
  str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  // Handle Yoruba-specific marks that NFD may not strip in some browsers
  str = str.replace(/[ṣṢ]/g,"s").replace(/[ọỌ]/g,"o").replace(/[ẹẸ]/g,"e");
  // Lowercase, trim, collapse whitespace
  str = str.toLowerCase().trim().replace(/\s+/g," ");
  // Strip common punctuation at edges and inside (keep alphanumerics and spaces only)
  str = str.replace(/[.,;:!?"'`’‘"”\-_()[\]{}]/g," ").replace(/\s+/g," ").trim();
  return str;
}
function gradeQuestion(q, answer){
  // Returns: {points, autoGraded, correct}
  if(q.type==="mcq"){
    const isC = (answer!==undefined && answer!==null && parseInt(answer)===parseInt(q.correct));
    return {points: isC?q.points:0, autoGraded:true, correct:isC};
  }
  if(q.type==="tf"){
    const isC = (answer===q.correct || String(answer)===String(q.correct));
    return {points: isC?q.points:0, autoGraded:true, correct:isC};
  }
  if(q.type==="fib"){
    const norm = normalizeAnswer(answer);
    if(!norm) return {points:0, autoGraded:true, correct:false};
    const accepts = (q.accepts||[]).map(normalizeAnswer);
    const isC = accepts.includes(norm);
    return {points: isC?q.points:0, autoGraded:true, correct:isC};
  }
  // short or essay — manual grade
  return {points:0, autoGraded:false, correct:null};
}

function gradeSubmission(test, answers){
  let auto=0, maxAuto=0, manual=0, maxManual=0;
  const grades={};
  (test.questions||[]).forEach(q=>{
    const g=gradeQuestion(q, answers[q.id]);
    grades[q.id]=g;
    if(g.autoGraded){ auto+=g.points; maxAuto+=q.points; }
    else { maxManual+=q.points; }
  });
  return {autoScore:auto, maxAuto, manualScore:0, maxManual, totalScore:auto, maxTotal:maxAuto+maxManual, grades};
}

function startTakingTest(testId){
  const t=S.data.tests.find(x=>x.id===testId);if(!t)return;
  // Check if already submitted
  const existing=S.data.testSubs.find(s=>s.testId===testId&&s.studentUid===(S.user.id||fbAuth.currentUser?.uid));
  if(existing){notify("You have already submitted this test.","err");return;}
  if(!t.published){notify("This test is not yet published.","err");return;}
  // Window check
  const now=Date.now();
  if(t.openAt && new Date(t.openAt).getTime() > now){notify("Test has not opened yet.","err");return;}
  if(t.closeAt && new Date(t.closeAt).getTime() < now){notify("Test has closed.","err");return;}
  S.activeTest=testId;
  S.activeTestStartedAt=Date.now();
  S.activeAnswers={};
  S.pg="takeTest";
  render();
  if(t.duration>0)startTestTimer(t.duration);
}

function startTestTimer(durationMins){
  clearInterval(window._testTimer);
  const endAt = S.activeTestStartedAt + durationMins*60*1000;
  window._testTimer = setInterval(()=>{
    const left = endAt - Date.now();
    if(left<=0){
      clearInterval(window._testTimer);
      notify("Time's up — submitting your test.","info");
      submitTest(true);
      return;
    }
    const el=document.getElementById("test-timer");
    if(el){
      const mins=Math.floor(left/60000), secs=Math.floor((left%60000)/1000);
      el.textContent=mins+":"+(secs<10?"0":"")+secs;
      if(left<60000)el.style.color="var(--er)";
    }
  },1000);
}

async function submitTest(autoSubmit){

async function saveManualGrade(subId){
  if(S.role!=="lecturer"){notify("Lecturer only","err");return;}
  const sub=S.data.testSubs.find(s=>s.id===subId);if(!sub)return;
  const test=S.data.tests.find(t=>t.id===sub.testId);if(!test)return;
  let manualTotal=0;
  const manualGrades={};
  (test.questions||[]).forEach(q=>{
    if(q.type==="short"||q.type==="essay"){
      const ptsEl=document.getElementById("mg-pts-"+q.id);
      const fbEl=document.getElementById("mg-fb-"+q.id);
      const pts=Math.min(parseInt(ptsEl?.value)||0, q.points);
      manualGrades[q.id]={points:pts, feedback:fbEl?.value||""};
      manualTotal+=pts;
    }
  });
  sub.manualGrades=manualGrades;
  sub.manualScore=manualTotal;
  sub.totalScore=sub.autoScore+manualTotal;
  sub.status="graded";
  sub.gradedAt=Date.now();
  if(fbReady&&fbDB){
    try{ await fbDB.collection("test_submissions").doc(sub.id).set(sub); }
    catch(e){ notify("Save failed: "+e.message,"err"); return; }
  }
  saveTestSubs();
  S.gradingSub=null;
  notify("Grade saved. Total: "+sub.totalScore+"/"+sub.maxTotal);
  render();
}

// ── CSV Export Helpers ─────────────────────────────────
function csvEscape(v){
  if(v===null||v===undefined)return "";
  let s=String(v);
  if(s.includes(",")||s.includes("\"")||s.includes("\n")||s.includes("\r")){
    s='"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
function downloadCSV(filename, rows){
  const csv=rows.map(r=>r.map(csvEscape).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"}); // BOM for Excel
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function exportTestResultsCSV(testId){
  const test=S.data.tests.find(t=>t.id===testId);if(!test){notify("Test not found","err");return;}
  const subs=S.data.testSubs.filter(s=>s.testId===testId);
  if(subs.length===0){notify("No submissions to export","err");return;}
  const header=["Student Name","Matric Number","Submitted At","Time Used (mins)","Auto Score","Auto Max","Manual Score","Manual Max","Total Score","Total Max","Percentage","Status"];
  const rows=[header];
  subs.sort((a,b)=>(b.totalScore||0)-(a.totalScore||0)).forEach(s=>{
    const pct=s.maxTotal>0?Math.round((s.totalScore/s.maxTotal)*100):0;
    const mins=Math.floor((s.timeUsedSecs||0)/60)+":"+(((s.timeUsedSecs||0)%60).toString().padStart(2,"0"));
    rows.push([
      s.studentName||"", s.studentMatric||"",
      new Date(s.submittedAt||0).toLocaleString("en-NG"),
      mins, s.autoScore||0, s.maxAuto||0,
      s.manualScore||0, s.maxManual||0,
      s.totalScore||0, s.maxTotal||0,
      pct+"%", s.status||""
    ]);
  });
  const fname=(test.course||"Test").replace(/\s/g,"_")+"_"+(test.title||"").replace(/[^a-z0-9]/gi,"_").substring(0,30)+"_results.csv";
  downloadCSV(fname,rows);
  notify("CSV downloaded — open in Excel or upload to any LMS.");
}
function exportAttendanceCSV(courseCode){
  const k=ck(courseCode);
  const sessions=(S.data.attendance[k]||[]).filter(s=>!s.open).sort((a,b)=>(a.id||0)-(b.id||0));
  if(sessions.length===0){notify("No closed sessions to export","err");return;}
  const enrolled=ROSTER.filter(r=>r.course===courseCode).sort((a,b)=>a.name.localeCompare(b.name));
  if(enrolled.length===0){notify("No enrolled students found","err");return;}
  // Build header: Name, Matric, Session1Date-Topic, Session2..., Total Present, Total Late, Total Absent, % Attended
  const header=["Student Name","Matric"];
  sessions.forEach(s=>header.push((s.date||"")+" — "+(s.topic||"Session")));
  header.push("Total Present","Total Late","Total Absent","Sessions Held","Attendance %");
  const rows=[header];
  enrolled.forEach(stu=>{
    const row=[stu.name,stu.matric];
    let pres=0,late=0,abs=0;
    sessions.forEach(s=>{
      const rec=(s.records||[]).find(r=>r.matric===stu.matric);
      const status=rec?.status||"absent";
      row.push(status.toUpperCase());
      if(status==="present")pres++;
      else if(status==="late")late++;
      else abs++;
    });
    const total=sessions.length;
    const pct=total>0?Math.round(((pres+late)/total)*100):0;
    row.push(pres,late,abs,total,pct+"%");
    rows.push(row);
  });
  const fname=courseCode.replace(/\s/g,"_")+"_Attendance_"+new Date().toISOString().split("T")[0]+".csv";
  downloadCSV(fname,rows);
  notify("Attendance CSV downloaded.");
}

    <button class="btn btn-o btn-sm" onclick="dlFile(${f.id},'${c.code}')">${f.type==="link"?"Open ↗":"Download"}</button>

function rCAssign(c){

  </div>`:""}
  ${assigns.length===0&&!isNew?`<div class="empty"><div class="ei">📝</div><h4>No assignments yet</h4></div>`:""}

      <div class="adesc">${a.desc}</div>
      ${!isLec&&!mySub?`<button class="btn btn-p btn-sm" style="margin-top:12px" onclick="submitAssign('${c.code}',${a.id})">📤 Submit</button>`:""}
      ${!isLec&&mySub?`<div class="sub-ok">✅ Submitted · ${mySub.grade!==null?"Grade: "+mySub.grade+"/"+a.max+" ("+grade(mySub.grade).l+")"+(mySub.feedback?" — "+mySub.feedback:""):"⏳ Awaiting grade"}</div>`:""}
      ${isLec&&asubs.length>0?`<div class="slist"><div style="font-size:12px;font-weight:600;color:var(--mid);margin-bottom:7px">📥 ${asubs.length} submission${asubs.length!==1?"s":""}</div>

          <div style="display:flex;align-items:center;gap:7px"><span class="gc ${grade(s.grade).cl}">${s.grade!==null?s.grade+"/"+a.max+" ("+grade(s.grade).l+")":"Pending"}</span>

    </div>`;}).join("")}
  </div>`;
}

function rCAttendance(c){
  const k=ck(c.code);const sessions=S.data.attendance[k]||[];
  const isLec=S.role==="lecturer";
  const openSess=sessions.find(s=>s.open);
  // Get enrolled students for this course from roster
  const enrolled=ROSTER.filter(r=>r.course===c.code);

  if(isLec){
    return `<div>
    ${openSess?`
    <!-- KIOSK MODE: Student self-check-in form -->
    <div style="background:#FFF8E1;border:2px solid #FFB300;border-radius:14px;padding:20px;margin-bottom:20px">
      <h3 style="color:#7A4400;margin-bottom:10px">📱 Pass-Around Sign-In</h3>
      <p style="font-size:13px;color:#8B6500;margin-bottom:12px">Pass this device to each student. They type their name and the code, then click Mark Me Present. Form auto-clears for the next student.</p>

        <div class="fg" style="margin-bottom:8px"><label style="font-size:12px">Student Name or Matric Number</label><input id="kiosk-name" placeholder="Type your name or matric number" autofocus style="font-size:15px"></div>

      </div>
      <button class="btn btn-p btn-full" onclick="kioskMark('${c.code}')" style="font-size:16px;padding:12px">✅ Mark Me Present</button>
    </div>
    
    <!-- ACTIVE SESSION CODE DISPLAY -->
    <div class="att-code-box">
      <div class="att-status-open"><span style="width:8px;height:8px;background:#7FFFB0;border-radius:50%;display:inline-block"></span> Session Open</div>
      <div class="att-code-label">Session Code — Show this to your class</div>
      <div class="att-code" id="live-code">${getActiveCode(openSess)||"------"}</div>
      <div id="code-timer" style="font-size:12px;color:rgba(255,255,255,.55);margin-top:-8px;margin-bottom:8px">Changes every 2 minutes</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6)">${openSess.date} · ${openSess.topic} · Grace period: ${openSess.graceMins} minutes</div>
      <div class="att-code-tip">✅ Present = within ${openSess.graceMins} min &nbsp;·&nbsp; 🕐 Late = after ${openSess.graceMins} min &nbsp;·&nbsp; Each student can only mark once</div>
    </div>
    <div class="sh">
      <h3 style="font-size:17px">Class Register — ${openSess.date}</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">

        ${sessions.filter(s=>!s.open).length>0?`<button class="btn btn-o btn-sm" onclick="exportAttendanceCSV('${c.code}')">📥 CSV (All Sessions)</button>`:""}
        <button class="btn btn-d btn-sm" onclick="closeAttSession('${c.code}',${openSess.id})">Close Session</button>
      </div>
    </div>
    ${rAttRegister(openSess,c.code,enrolled,true)}`:""}

    ${!openSess?`
    <!-- START NEW SESSION -->
    <div class="panel" style="border:1.5px solid var(--p3);margin-bottom:20px">

    ${sessions.filter(s=>!s.open).length>0?`

function scoreDocId(courseKey, matric){
  return "score_"+courseKey+"_"+String(matric).replace(/\W/g,"_");
}

function computeGrade(total){
  if(total===null||total===undefined||total==="")return{l:"—",cl:"",gp:"—"};
  const t=Number(total);
  if(t>=70)return{l:"A",cl:"ga",gp:"5.0"};
  if(t>=60)return{l:"B",cl:"gb",gp:"4.0"};
  if(t>=50)return{l:"C",cl:"gc",gp:"3.0"};
  if(t>=45)return{l:"D",cl:"gd",gp:"2.0"};
  return{l:"F",cl:"gf",gp:"0.0"};
}

async function loadScoresFromFirestore(){
  if(!fbReady||!fbDB) return;
  try{
    const snap=await fbDB.collection("scores").get();
    snap.forEach(doc=>{
      const d=doc.data();
      S.data.scores[doc.id]=d;
    });
    saveScores();
    console.log("✓ Scores loaded from Firestore:",snap.size);
  }catch(e){console.warn("loadScoresFromFirestore:",e);}
}

let fbScoresUnsub=null;
function startScoresListener(){
  if(!fbReady||!fbDB||!S.user) return;
  if(fbScoresUnsub){try{fbScoresUnsub();}catch(e){}}
  fbScoresUnsub=fbDB.collection("scores").onSnapshot(snap=>{
    snap.docChanges().forEach(change=>{
      if(change.type==="removed") delete S.data.scores[change.doc.id];
      else S.data.scores[change.doc.id]=change.doc.data();
    });
    saveScores();
    if(S.pg==="results"||S.pg==="grading") render();
  },err=>console.warn("Scores listener:",err));
}

async function saveStudentScore(courseCode, matric, studentName, ca, exam){
  if(S.role!=="lecturer"){notify("Lecturer only","err");return;}
  const k=ck(courseCode);
  const caVal=ca===""?null:Math.min(Math.max(parseFloat(ca)||0,0),CFG.caMax);
  const examVal=exam===""?null:Math.min(Math.max(parseFloat(exam)||0,0),CFG.examMax);
  const total=(caVal!==null&&examVal!==null)?caVal+examVal:null;
  const g=computeGrade(total);
  const rec={
    id:scoreDocId(k,matric), courseKey:k, course:courseCode,
    matric:String(matric), studentName,
    ca:caVal, exam:examVal, total,
    grade:g.l, gradePoint:g.gp,
    updatedAt:Date.now(), updatedBy:S.user.name||"Lecturer"
  };
  S.data.scores[rec.id]=rec;
  saveScores();
  if(fbReady&&fbDB){
    try{await fbDB.collection("scores").doc(rec.id).set(rec);}
    catch(e){notify("Cloud save failed: "+e.message,"err");}
  }
}

async function saveBatchScores(courseCode){
  if(S.role!=="lecturer"){notify("Lecturer only","err");return;}
  const enrolled=ROSTER.filter(r=>r.course===courseCode);
  const promises=enrolled.map(r=>{
    const caEl=document.getElementById("sc-ca-"+r.matric);
    const exEl=document.getElementById("sc-ex-"+r.matric);
    if(!caEl&&!exEl)return Promise.resolve();
    return saveStudentScore(courseCode, r.matric, r.name, caEl?.value??"", exEl?.value??"");
  });
  await Promise.all(promises);
  notify("✓ All scores saved to cloud — students can now see their results.");
  render();
}

function getScore(courseCode, matric){
  const k=ck(courseCode);
  return S.data.scores[scoreDocId(k,matric)]||null;
}

function exportScoresCSV(courseCode){
  if(S.role!=="lecturer"){notify("Lecturer only","err");return;}
  const enrolled=ROSTER.filter(r=>r.course===courseCode);
  if(enrolled.length===0){notify("No students found for this course","err");return;}
  const headers=["Name","Matric","CA ("+CFG.caMax+")","Exam ("+CFG.examMax+")","Total (100)","Grade","Grade Point"];
  const rows=enrolled.map(r=>{
    const sc=getScore(courseCode,r.matric);
    const g=computeGrade(sc?.total);
    return[r.name,r.matric,sc?.ca??"",sc?.exam??"",sc?.total??"",sc?.grade||g.l,sc?.gradePoint||g.gp];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=courseCode.replace(/\s/g,"_")+"_Scores.csv";a.click();
  notify("Scores CSV downloaded.");
}

        <div style="display:flex;gap:8px;flex-wrap:wrap">

        return`<tr style="${i%2===0?"background:var(--ww)":"background:var(--cr)"};border-bottom:1px solid var(--br)">

          <td style="padding:8px 6px;text-align:center"><input id="sc-ex-${r.matric}" type="number" min="0" max="${CFG.examMax}" value="${exVal}" style="width:60px;text-align:center;padding:4px 6px;border:1.5px solid var(--br);border-radius:6px;font-size:13px"></td>

}


// ── RESULTS ──────────────────────────────────────────────────
function rResults(){
  if(S.role==="student"){
    // Student sees only their own scores across all courses
    const myMatric=S.user?.matric||"";
    const myName=S.user?.name||"";
    const rows=COURSES.map(c=>{
      const sc=getScore(c.code,myMatric);
      const g=computeGrade(sc?.total);
      return{course:c.code,title:c.title,ca:sc?.ca,exam:sc?.exam,total:sc?.total,grade:g,sc};
    });
    const graded=rows.filter(r=>r.total!==null&&r.total!==undefined);
    const cgpa=graded.length?(graded.reduce((a,r)=>a+parseFloat(r.grade.gp),0)/graded.length).toFixed(2):"—";
    return`<div>
      <div class="panel" style="margin-bottom:18px;border-left:4px solid var(--p2)">
        <h3 style="margin:0">${myName}</h3>
        <p style="font-size:12px;color:var(--mt);margin-top:4px">${myMatric} · ${CFG.session}</p>
        <p style="margin-top:10px;font-size:20px;font-weight:700;color:var(--p2)">CGPA: ${cgpa}</p>
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--p1);color:#fff">
          <th style="padding:10px 14px;text-align:left">Course</th>
          <th style="padding:10px 14px;text-align:center">CA /${CFG.caMax}</th>
          <th style="padding:10px 14px;text-align:center">Exam /${CFG.examMax}</th>
          <th style="padding:10px 14px;text-align:center">Total</th>
          <th style="padding:10px 14px;text-align:center">Grade</th>
          <th style="padding:10px 14px;text-align:center">GP</th>
        </tr></thead>
        <tbody>${rows.map((r,i)=>`<tr style="${i%2===0?"background:var(--ww)":"background:var(--cr)"};border-bottom:1px solid var(--br)">
          <td style="padding:10px 14px"><strong>${r.course}</strong><br><span style="font-size:11px;color:var(--mt)">${r.title.substring(0,40)}…</span></td>
          <td style="padding:10px 14px;text-align:center">${r.ca!==null&&r.ca!==undefined?r.ca:"—"}</td>
          <td style="padding:10px 14px;text-align:center">${r.exam!==null&&r.exam!==undefined?r.exam:"—"}</td>
          <td style="padding:10px 14px;text-align:center;font-weight:700;color:var(--p2)">${r.total!==null&&r.total!==undefined?r.total:"—"}</td>
          <td style="padding:10px 14px;text-align:center"><span class="gc ${r.grade.cl}">${r.grade.l}</span></td>
          <td style="padding:10px 14px;text-align:center;font-weight:600">${r.grade.gp}</td>
        </tr>`).join("")}</tbody>
      </table></div>
      ${rGradingScale()}
    </div>`;
  }
  // Lecturer sees all students
  const enrolled=[...new Set(ROSTER.map(r=>r.matric))].map(mat=>{
    const r=ROSTER.find(x=>x.matric===mat);
    return{name:r.name,matric:mat};
  });
  if(enrolled.length===0)return`<div class="empty"><div class="ei">📊</div><h4>No scores yet</h4><p>Enter scores in Grading → Score Entry first.</p></div>`;
  return`<div>
    <p style="font-size:13px;color:var(--mt);margin-bottom:18px">${CFG.session} · ${CFG.college}</p>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:var(--p1);color:#fff">
        <th style="padding:9px 12px;text-align:left">Student</th>
        <th style="padding:9px 12px;text-align:left">Matric</th>
        ${COURSES.map(c=>`<th style="padding:9px 12px;text-align:center;white-space:nowrap">${c.code}<br><span style="font-size:10px;opacity:.75">CA/Exam/Total</span></th>`).join("")}
        <th style="padding:9px 12px;text-align:center">CGPA</th>
      </tr></thead>
      <tbody>${enrolled.map((u,i)=>{
        const courseScores=COURSES.map(c=>{
          const sc=getScore(c.code,u.matric);
          const g=computeGrade(sc?.total);
          return{sc,g};
        });
        const graded=courseScores.filter(x=>x.sc?.total!==null&&x.sc?.total!==undefined);
        const cgpa=graded.length?(graded.reduce((a,x)=>a+parseFloat(x.g.gp),0)/graded.length).toFixed(2):"—";
        return`<tr style="${i%2===0?"background:var(--ww)":"background:var(--cr)"};border-bottom:1px solid var(--br)">
          <td style="padding:8px 12px;font-weight:500;white-space:nowrap">${u.name}</td>
          <td style="padding:8px 12px;color:var(--mt)">${u.matric}</td>
          ${courseScores.map(({sc,g})=>`<td style="padding:8px 12px;text-align:center">
            ${sc?.total!==null&&sc?.total!==undefined?`<span class="gc ${g.cl}" style="font-size:11px">${sc.ca}/${sc.exam}/<strong>${sc.total}</strong></span>`:`<span style="color:var(--mt)">—</span>`}
          </td>`).join("")}
          <td style="padding:8px 12px;text-align:center;font-weight:700;color:var(--p2)">${cgpa}</td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
    ${rGradingScale()}
  </div>`;
}

function rGradingScale(){
  return`<div class="panel" style="margin-top:18px;max-width:440px"><h3>Grading Scale</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      ${[["A","70–100","5.0"],["B","60–69","4.0"],["C","50–59","3.0"],["D","45–49","2.0"],["F","0–44","0.0"]].map(([l,r,gp])=>`<div style="background:var(--cr);border:1px solid var(--br);border-radius:8px;padding:8px 12px;text-align:center;min-width:66px"><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--p2)">${l}</div><div style="font-size:11px;color:var(--mt)">${r}</div><div style="font-size:11px;font-weight:600">GP: ${gp}</div></div>`).join("")}
    </div>
  </div>`;
}

// ── TESTS ────────────────────────────────────────────────────
function escapeHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function rTests(){
  if(S.role==="lecturer")return rTestsLec();
  return rTestsStudent();
}

function rTestsLec(){
  const tab=S.testTab||"all";
  return `<div>
    <div class="ctabs" style="margin-bottom:20px">
      ${[["all","📋 All Tests"],["create","➕ Create New"],["bank","📚 Question Bank"],["submissions","✅ Submissions"]].map(([t,l])=>`<div class="ctab ${tab===t?"on":""}" onclick="S.testTab='${t}';S.activeTest=null;S.gradingSub=null;render()">${l}</div>`).join("")}
    </div>
    ${tab==="all"?rTestsListLec():
      tab==="create"?rTestCreateForm():
      tab==="edit"?rTestEditor():
      tab==="bank"?rQbankPage():
      tab==="submissions"?rSubmissionsPage():""}
  </div>`;
}

function rTestsListLec(){
  if(!S.data.tests.length){
    return `<div class="empty"><div class="ei">🧪</div><h4>No tests yet</h4><p>Click "Create New" to build your first test.</p></div>`;
  }
  const sorted=[...S.data.tests].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  return `<div style="display:grid;gap:14px">
    ${sorted.map(t=>{
      const subs=S.data.testSubs.filter(s=>s.testId===t.id);
      const qCount=(t.questions||[]).length;
      const totalPts=(t.questions||[]).reduce((a,q)=>a+(q.points||0),0);
      return `<div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
          <div style="flex:1;min-width:240px">
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <h3 style="margin:0">${escapeHtml(t.title)}</h3>
              ${t.published?`<span style="background:var(--su);color:#fff;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600">PUBLISHED</span>`:`<span style="background:var(--sv);color:#fff;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600">DRAFT</span>`}
            </div>
            <p class="cm" style="margin-top:6px">📘 ${t.course} · ${qCount} questions · ${totalPts} pts ${t.duration?"· ⏱️ "+t.duration+" min":"· No timer"} · 📥 ${subs.length} submissions</p>
            ${t.instructions?`<p style="font-size:12px;color:var(--mt);margin-top:6px">${escapeHtml(t.instructions.substring(0,140))}${t.instructions.length>140?"…":""}</p>`:""}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm ${t.published?"btn-sv":"btn-g"}" onclick="togglePublish('${t.id}')">${t.published?"📌 Unpublish":"🚀 Publish"}</button>
            <button class="btn btn-o btn-sm" onclick="S.activeTest='${t.id}';S.testTab='edit';render()">✏️ Edit</button>
            ${subs.length>0?`<button class="btn btn-o btn-sm" onclick="exportTestResultsCSV('${t.id}')">📥 CSV</button>`:""}
            <button class="btn btn-d btn-sm" onclick="deleteTest('${t.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function rTestCreateForm(){
  return `<div class="panel" style="border:1.5px solid var(--p3);max-width:680px">
    <h3>Create a New Test</h3>
    <p style="font-size:13px;color:var(--mt);margin-bottom:18px">Fill in the basics — you'll add questions on the next screen.</p>
    <div class="fg"><label>Test Title *</label><input id="nt-title" placeholder="e.g., Mid-Semester Test on Yoruba Drama"></div>
    <div class="fg"><label>Course *</label><select id="nt-course">${COURSES.map(c=>`<option value="${c.code}">${c.code} — ${c.title}</option>`).join("")}</select></div>
    <div class="fg"><label>Instructions for Students</label><textarea id="nt-instr" rows="3" placeholder="Read each question carefully. You have one attempt. Good luck!"></textarea></div>
    <div class="g2">
      <div class="fg"><label>Duration in Minutes (0 = no timer)</label><input id="nt-dur" type="number" min="0" placeholder="e.g., 30"></div>
      <div class="fg"><label>Total Points (computed from questions)</label><input value="0" readonly style="background:var(--svl)"></div>
    </div>
    <div class="g2">
      <div class="fg"><label>Opens At (optional)</label><input id="nt-open" type="datetime-local"></div>
      <div class="fg"><label>Closes At (optional)</label><input id="nt-close" type="datetime-local"></div>
    </div>
    <button class="btn btn-p btn-full" onclick="createTest()">Create Test & Add Questions →</button>
  </div>`;
}

function rTestEditor(){
  const t=S.data.tests.find(x=>x.id===S.activeTest);
  if(!t)return `<div class="empty"><div class="ei">❓</div><h4>Test not found</h4><button class="btn btn-p btn-sm" onclick="S.testTab='all';render()">← Back to All Tests</button></div>`;
  const totalPts=(t.questions||[]).reduce((a,q)=>a+(q.points||0),0);
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:18px">
      <div>
        <h3 style="font-size:22px;color:var(--p1)">${escapeHtml(t.title)}</h3>
        <p style="font-size:12px;color:var(--mt)">${t.course} · ${(t.questions||[]).length} questions · ${totalPts} pts ${t.duration?"· ⏱️ "+t.duration+" min":""}</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${t.published?`<button class="btn btn-sv btn-sm" onclick="togglePublish('${t.id}')">📌 Unpublish</button>`:`<button class="btn btn-g btn-sm" onclick="togglePublish('${t.id}')">🚀 Publish</button>`}
        <button class="btn btn-gh btn-sm" onclick="S.testTab='all';S.activeTest=null;render()">← Back</button>
      </div>
    </div>

    ${(t.questions||[]).length>0?`<div class="panel" style="margin-bottom:18px"><h3>Questions in this Test</h3>
      ${t.questions.map((q,i)=>{
        const typeLabel={mcq:"🔘 MCQ",tf:"✓✗ True/False",fib:"___ Fill in the Blank",short:"✏️ Short Answer",essay:"📝 Essay"}[q.type]||q.type;
        let body="";
        if(q.type==="mcq")body=`<ul style="margin:8px 0 0 18px;font-size:13px">${q.options.map((o,oi)=>`<li style="${oi===q.correct?"color:var(--su);font-weight:600":""}">${escapeHtml(o)}${oi===q.correct?" ✓":""}</li>`).join("")}</ul>`;
        else if(q.type==="tf")body=`<p style="margin-top:6px;font-size:13px;color:var(--su)">Correct: ${q.correct?"True":"False"} ✓</p>`;
        else if(q.type==="fib")body=`<p style="margin-top:6px;font-size:13px;color:var(--su)">Accepts: ${q.accepts.map(escapeHtml).join(" / ")}</p>`;
        else body=`<p style="margin-top:6px;font-size:12px;color:var(--mt);font-style:italic">Manual grading (lecturer reviews after submission)</p>`;
        return `<div style="background:var(--cr);border:1px solid var(--br);border-radius:8px;padding:14px;margin-top:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div style="flex:1"><strong>Q${i+1}.</strong> <span style="font-size:11px;color:var(--mt);margin-left:6px">${typeLabel} · ${q.points} pt${q.points===1?"":"s"}</span>
              <p style="margin-top:4px">${escapeHtml(q.text)}</p>
              ${body}
            </div>
            <button class="btn btn-d btn-sm" onclick="deleteQuestion('${t.id}','${q.id}')">🗑️</button>
          </div>
        </div>`;
      }).join("")}
    </div>`:""}

    <div class="panel" style="border:1.5px solid var(--p3)">
      <h3>Add a Question</h3>
      ${(function(){
        const curType = document.getElementById("nq-type")?.value || "mcq";
        return `<div class="g2">
        <div class="fg"><label>Question Type</label><select id="nq-type" onchange="render()">
          <option value="mcq" ${curType==="mcq"?"selected":""}>🔘 Multiple Choice (auto-graded)</option>
          <option value="tf" ${curType==="tf"?"selected":""}>✓✗ True/False (auto-graded)</option>
          <option value="fib" ${curType==="fib"?"selected":""}>___ Fill in the Blank (auto-graded)</option>
          <option value="short" ${curType==="short"?"selected":""}>✏️ Short Answer (you grade manually)</option>
          <option value="essay" ${curType==="essay"?"selected":""}>📝 Essay (you grade manually)</option>
        </select></div>
        <div class="fg"><label>Points *</label><input id="nq-points" type="number" min="1" value="1"></div>
      </div>
      <div class="fg"><label>Question Text *</label><textarea id="nq-text" rows="2" placeholder="Type your question here..."></textarea></div>
      ${rQuestionTypeFields("nq", curType)}`;
      })()}
      <label style="display:flex;gap:8px;align-items:center;font-size:13px;margin:10px 0"><input type="checkbox" id="nq-save-bank"> Also save to Question Bank for reuse</label>
      ${S.data.qbank.length>0?`<div style="border-top:1px solid var(--br);padding-top:12px;margin-top:12px">
        <label style="font-size:11.5px;font-weight:600;color:var(--mid);text-transform:uppercase">📚 Or pull from Question Bank</label>
        <div style="margin-top:8px;max-height:180px;overflow-y:auto;border:1px solid var(--br);border-radius:8px">
        ${S.data.qbank.filter(bq=>!bq.course||bq.course===t.course).slice(0,20).map(bq=>`<div style="padding:8px 12px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between;gap:10px;align-items:center"><span style="font-size:12px;flex:1">${escapeHtml(bq.text.substring(0,80))}${bq.text.length>80?"…":""} <span style="color:var(--mt)">· ${bq.type.toUpperCase()} · ${bq.points}pt</span></span><button class="btn btn-o btn-sm" onclick="pullFromBank('${t.id}','${bq.id}')">+ Add</button></div>`).join("")}
        </div>
      </div>`:""}
      <button class="btn btn-p btn-full" style="margin-top:12px" onclick="addQuestionToTest('${t.id}')">Add Question to Test</button>
    </div>
  </div>`;
}

function rQuestionTypeFields(prefix,type){
  if(type==="mcq"){
    return `<div class="fg"><label>Options (provide at least 2, leave extras blank)</label>
      ${[0,1,2,3].map(i=>`<input id="${prefix}-opt-${i}" placeholder="Option ${"ABCD"[i]}" style="margin-bottom:6px">`).join("")}
    </div>
    <div class="fg"><label>Correct Option *</label><select id="${prefix}-correct">
      ${[0,1,2,3].map(i=>`<option value="${i}">${"ABCD"[i]}</option>`).join("")}
    </select></div>`;
  }
  if(type==="tf"){
    return `<div class="fg"><label>Correct Answer *</label><select id="${prefix}-tf">
      <option value="true">True</option><option value="false">False</option>
    </select></div>`;
  }
  if(type==="fib"){
    return `<div class="fg"><label>Acceptable Answers (separate with |) *</label>
      <input id="${prefix}-accepts" placeholder="e.g.,  Ibsen | Henrik Ibsen | henrik ibsen">
      <p style="font-size:11px;color:var(--mt);margin-top:4px">Matching is case-insensitive and ignores extra spaces. Use | to list variants.</p>
    </div>`;
  }
  return `<div style="background:var(--svl);padding:10px;border-radius:6px;font-size:12px;color:var(--mt)">💡 You will grade ${type==="essay"?"essay":"short answer"} submissions manually after students submit.</div>`;
}

    <div class="panel" style="border:1.5px solid var(--p3);margin-bottom:18px">

      <p style="font-size:13px;color:var(--mt);margin-bottom:12px">Questions saved here can be reused in any test, this semester or next.</p>
      ${(function(){
        const curType = document.getElementById("bq-type")?.value || "mcq";
        return `<div class="g2">
        <div class="fg"><label>Question Type</label><select id="bq-type" onchange="render()">
          <option value="mcq" ${curType==="mcq"?"selected":""}>🔘 Multiple Choice</option>
          <option value="tf" ${curType==="tf"?"selected":""}>✓✗ True/False</option>
          <option value="fib" ${curType==="fib"?"selected":""}>___ Fill in the Blank</option>
          <option value="short" ${curType==="short"?"selected":""}>✏️ Short Answer</option>
          <option value="essay" ${curType==="essay"?"selected":""}>📝 Essay</option>
        </select></div>
        <div class="fg"><label>Course Tag</label><select id="bq-course">${COURSES.map(c=>`<option value="${c.code}">${c.code}</option>`).join("")}</select></div>
      </div>
      <div class="g2">
        <div class="fg"><label>Points</label><input id="bq-points" type="number" min="1" value="1"></div>
        <div></div>
      </div>
      <div class="fg"><label>Question Text *</label><textarea id="bq-text" rows="2"></textarea></div>
      ${rQuestionTypeFields("bq", curType)}`;
      })()}
      <button class="btn btn-p btn-full" style="margin-top:8px" onclick="saveBankQuestion()">Save to Bank</button>
    </div>

    <h3>Saved Questions (${filtered.length})</h3>
    ${filtered.length===0?`<div class="empty"><div class="ei">📚</div><h4>Bank is empty</h4><p>Add your first reusable question above.</p></div>`:`
      <div style="display:grid;gap:10px;margin-top:12px">
      ${[...filtered].reverse().map(bq=>{
        const typeLabel={mcq:"🔘 MCQ",tf:"✓✗ T/F",fib:"___ FIB",short:"✏️ Short",essay:"📝 Essay"}[bq.type];
        return `<div class="panel" style="padding:14px"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div style="flex:1"><p style="margin-bottom:4px"><strong>${escapeHtml(bq.text)}</strong></p><p style="font-size:11.5px;color:var(--mt)">${typeLabel} · ${bq.points}pt · ${bq.course||"Any course"}</p></div><button class="btn btn-d btn-sm" onclick="deleteBankQuestion('${bq.id}')">🗑️</button></div></div>`;
      }).join("")}
      </div>
    `}
  </div>`;
}

function rSubmissionsPage(){
  if(S.gradingSub){return rGradeSubmission();}
  const allSubs=[...S.data.testSubs].sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
  if(allSubs.length===0){
    return `<div class="empty"><div class="ei">✅</div><h4>No submissions yet</h4><p>Once students submit tests they will appear here.</p></div>`;
  }
  // Group by test
  const byTest={};
  allSubs.forEach(s=>{
    if(!byTest[s.testId])byTest[s.testId]=[];
    byTest[s.testId].push(s);
  });
  return `<div>${Object.entries(byTest).map(([tid,subs])=>{
    const test=S.data.tests.find(t=>t.id===tid);
    const title=test?.title||subs[0].testTitle||"(deleted test)";
    return `<div class="panel" style="margin-bottom:18px">
      <h3>${escapeHtml(title)}</h3>
      <p class="cm" style="margin-bottom:12px">${subs.length} submission${subs.length===1?"":"s"} · ${test?.course||""}</p>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="text-align:left;border-bottom:2px solid var(--p3)">
          <th style="padding:8px">Student</th><th style="padding:8px">Matric</th>
          <th style="padding:8px">Submitted</th><th style="padding:8px">Time</th>
          <th style="padding:8px">Auto</th><th style="padding:8px">Manual</th>
          <th style="padding:8px">Total</th><th style="padding:8px">Status</th><th></th>
        </tr></thead><tbody>
        ${subs.map(s=>{
          const submitDate=new Date(s.submittedAt||0).toLocaleString("en-NG",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
          const mins=Math.floor((s.timeUsedSecs||0)/60),secs=(s.timeUsedSecs||0)%60;
          const statusColor=s.status==="graded"?"var(--su)":"var(--g1)";
          return `<tr style="border-bottom:1px solid var(--br)">
            <td style="padding:8px"><strong>${escapeHtml(s.studentName||"")}</strong></td>
            <td style="padding:8px">${escapeHtml(s.studentMatric||"")}</td>
            <td style="padding:8px">${submitDate}</td>
            <td style="padding:8px">${mins}:${secs<10?"0":""}${secs}</td>
            <td style="padding:8px">${s.autoScore}/${s.maxAuto}</td>
            <td style="padding:8px">${s.maxManual>0?(s.manualScore||0)+"/"+s.maxManual:"—"}</td>
            <td style="padding:8px"><strong>${s.totalScore}/${s.maxTotal}</strong></td>
            <td style="padding:8px;color:${statusColor};font-weight:600;text-transform:uppercase;font-size:11px">${s.status==="graded"?"✓ Graded":"⏳ Pending"}</td>
            <td style="padding:8px">${s.maxManual>0?`<button class="btn btn-o btn-sm" onclick="S.gradingSub='${s.id}';render()">${s.status==="graded"?"View":"Grade"}</button>`:`<button class="btn btn-gh btn-sm" onclick="S.gradingSub='${s.id}';render()">View</button>`}</td>
          </tr>`;
        }).join("")}
      </tbody></table>
    </div>`;
  }).join("")}</div>`;
}

function rGradeSubmission(){
  const sub=S.data.testSubs.find(s=>s.id===S.gradingSub);
  if(!sub)return `<div><button class="btn btn-gh btn-sm" onclick="S.gradingSub=null;render()">← Back</button><p>Submission not found.</p></div>`;
  const test=S.data.tests.find(t=>t.id===sub.testId);
  if(!test)return `<div><button class="btn btn-gh btn-sm" onclick="S.gradingSub=null;render()">← Back</button><p>Test not found.</p></div>`;
  return `<div>
    <button class="btn btn-gh btn-sm" onclick="S.gradingSub=null;render()">← Back to Submissions</button>
    <div class="panel" style="margin-top:14px">
      <h3>${escapeHtml(sub.studentName)} — ${escapeHtml(test.title)}</h3>
      <p class="cm">Matric: ${escapeHtml(sub.studentMatric)} · Submitted: ${new Date(sub.submittedAt).toLocaleString("en-NG")}</p>
      <p style="margin-top:8px">Auto: <strong>${sub.autoScore}/${sub.maxAuto}</strong> · Manual: <strong>${sub.manualScore||0}/${sub.maxManual}</strong> · Total: <strong style="color:var(--p2);font-size:18px">${sub.totalScore}/${sub.maxTotal}</strong></p>
    </div>
    <div style="display:grid;gap:14px;margin-top:14px">
    ${(test.questions||[]).map((q,i)=>{
      const ans=sub.answers[q.id];
      const grade=sub.grades?.[q.id];
      const manualGrade=sub.manualGrades?.[q.id];
      const typeLabel={mcq:"🔘 MCQ",tf:"✓✗ T/F",fib:"___ FIB",short:"✏️ Short",essay:"📝 Essay"}[q.type];
      let ansDisplay="";
      if(q.type==="mcq"){
        ansDisplay=ans!==undefined?`<strong>${escapeHtml(q.options[ans]||"(no answer)")}</strong> — Correct: ${escapeHtml(q.options[q.correct])}`:"<em>No answer</em>";
      } else if(q.type==="tf"){
        ansDisplay=ans!==undefined?`<strong>${ans?"True":"False"}</strong> — Correct: ${q.correct?"True":"False"}`:"<em>No answer</em>";
      } else if(q.type==="fib"){
        ansDisplay=ans?`<strong>${escapeHtml(ans)}</strong> — Accepted: ${q.accepts.map(escapeHtml).join(" / ")}`:"<em>No answer</em>";
      } else {
        ansDisplay=ans?`<div style="background:var(--ww);padding:10px;border-radius:6px;border:1px solid var(--br);margin-top:6px;white-space:pre-wrap">${escapeHtml(ans)}</div>`:"<em>No answer</em>";
      }
      const autoMark=grade?.autoGraded?(grade.correct?`<span style="color:var(--su);font-weight:600">✓ Correct (+${grade.points})</span>`:`<span style="color:var(--er);font-weight:600">✗ Incorrect (0 pts)</span>`):"";
      const isManual=q.type==="short"||q.type==="essay";
      return `<div class="panel">
        <p><strong>Q${i+1}.</strong> <span style="font-size:11px;color:var(--mt);margin-left:6px">${typeLabel} · ${q.points} pt${q.points===1?"":"s"}</span></p>
        <p style="margin-top:4px">${escapeHtml(q.text)}</p>
        <div style="margin-top:8px">${ansDisplay}</div>
        ${autoMark?`<p style="margin-top:8px">${autoMark}</p>`:""}
        ${isManual?`<div style="border-top:1px solid var(--br);margin-top:12px;padding-top:12px">
          <div class="g2">
            <div class="fg"><label>Points (out of ${q.points})</label><input id="mg-pts-${q.id}" type="number" min="0" max="${q.points}" value="${manualGrade?.points??""}"></div>
            <div></div>
          </div>
          <div class="fg"><label>Feedback for student (optional)</label><textarea id="mg-fb-${q.id}" rows="2">${escapeHtml(manualGrade?.feedback||"")}</textarea></div>
        </div>`:""}
      </div>`;
    }).join("")}
    </div>
    ${(test.questions||[]).some(q=>q.type==="short"||q.type==="essay")?`<button class="btn btn-p btn-full" style="margin-top:14px" onclick="saveManualGrade('${sub.id}')">💾 Save Grades & Mark as Graded</button>`:""}
  </div>`;
}

function rTestsStudent(){
  const myUid=S.user.id||fbAuth.currentUser?.uid||"unknown";
  // Find courses this student is in via ROSTER
  const myCourses=COURSES.filter(c=>ROSTER.some(r=>r.matric===S.user.matric&&r.course===c.code));
  const courseCodes=myCourses.length>0?myCourses.map(c=>c.code):COURSES.map(c=>c.code);
  const myTests=S.data.tests.filter(t=>t.published && courseCodes.includes(t.course));
  const mySubs=S.data.testSubs.filter(s=>s.studentUid===myUid);
  if(myTests.length===0){
    return `<div class="empty"><div class="ei">🧪</div><h4>No tests available</h4><p>Your lecturer hasn't published any tests yet. Check back later.</p></div>`;
  }
  const now=Date.now();
  return `<div style="display:grid;gap:14px">
  ${myTests.map(t=>{
    const mySub=mySubs.find(s=>s.testId===t.id);
    const totalPts=(t.questions||[]).reduce((a,q)=>a+(q.points||0),0);
    const openAtMs=t.openAt?new Date(t.openAt).getTime():0;
    const closeAtMs=t.closeAt?new Date(t.closeAt).getTime():0;
    const notOpenYet=openAtMs && openAtMs>now;
    const closed=closeAtMs && closeAtMs<now;
    let status="", action="";
    if(mySub){
      const showScore=mySub.status==="graded"||mySub.maxManual===0;
      status=`<span style="background:var(--su);color:#fff;padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600">✓ SUBMITTED</span>`;
      action=`<div style="margin-top:10px;padding:12px;background:var(--cr);border-radius:8px"><p style="font-size:14px"><strong>Your score:</strong> ${showScore?mySub.totalScore+"/"+mySub.maxTotal:mySub.autoScore+"/"+mySub.maxAuto+" (auto)"}</p>${mySub.maxManual>0&&mySub.status!=="graded"?`<p style="font-size:12px;color:var(--mt);margin-top:4px">${mySub.maxManual} pts pending manual review by lecturer</p>`:""}</div>`;
    } else if(notOpenYet){
      status=`<span style="background:var(--g2);color:#fff;padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600">⏰ NOT YET OPEN</span>`;
      action=`<p style="font-size:13px;color:var(--mt);margin-top:8px">Opens: ${new Date(t.openAt).toLocaleString("en-NG")}</p>`;
    } else if(closed){
      status=`<span style="background:var(--er);color:#fff;padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600">❌ CLOSED</span>`;
      action=`<p style="font-size:13px;color:var(--mt);margin-top:8px">Closed on ${new Date(t.closeAt).toLocaleString("en-NG")}</p>`;
    } else {
      status=`<span style="background:var(--p2);color:#fff;padding:4px 12px;border-radius:14px;font-size:12px;font-weight:600">🔓 AVAILABLE</span>`;
      action=`<button class="btn btn-p" style="margin-top:10px" onclick="startTakingTest('${t.id}')">Start Test →</button>`;
    }
    return `<div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div style="flex:1;min-width:240px">
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
            <h3 style="margin:0">${escapeHtml(t.title)}</h3>${status}
          </div>
          <p class="cm">📘 ${t.course} · ${(t.questions||[]).length} questions · ${totalPts} pts ${t.duration?"· ⏱️ "+t.duration+" min limit":"· No time limit"}</p>
          ${t.instructions?`<p style="font-size:13px;color:var(--mt);margin-top:8px">${escapeHtml(t.instructions)}</p>`:""}
          ${action}
        </div>
      </div>
    </div>`;
  }).join("")}
  </div>`;
}

function rTakeTest(){
  const t=S.data.tests.find(x=>x.id===S.activeTest);
  if(!t)return `<div class="empty"><div class="ei">❓</div><h4>Test not found</h4></div>`;
  return `<div>
    <div style="position:sticky;top:0;background:var(--ww);border-bottom:1.5px solid var(--p3);padding:14px 0;margin-bottom:20px;z-index:10">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div><h3 style="margin:0;color:var(--p1)">${escapeHtml(t.title)}</h3><p style="font-size:12px;color:var(--mt);margin-top:2px">${t.course} · ${(t.questions||[]).length} questions</p></div>
        ${t.duration?`<div style="text-align:right"><div style="font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px">Time Remaining</div><div id="test-timer" style="font-size:28px;font-weight:700;color:var(--p2);font-family:'Cormorant Garamond',serif">${t.duration}:00</div></div>`:""}
      </div>
    </div>
    ${t.instructions?`<div class="nbox pur" style="margin-bottom:18px"><strong>Instructions:</strong> ${escapeHtml(t.instructions)}</div>`:""}
    <div style="display:grid;gap:16px">
    ${(t.questions||[]).map((q,i)=>{
      let body="";
      if(q.type==="mcq"){
        body=q.options.map((o,oi)=>`<label style="display:flex;gap:10px;padding:10px 14px;border:1.5px solid var(--br);border-radius:8px;margin-top:6px;cursor:pointer;background:var(--ww)"><input type="radio" name="ans-${q.id}" value="${oi}" onchange="recordAnswer('${q.id}',${oi})"><span>${escapeHtml(o)}</span></label>`).join("");
      } else if(q.type==="tf"){
        body=`<div style="display:flex;gap:10px;margin-top:8px">
          <label style="flex:1;display:flex;gap:10px;padding:12px;border:1.5px solid var(--br);border-radius:8px;cursor:pointer;background:var(--ww);justify-content:center"><input type="radio" name="ans-${q.id}" value="true" onchange="recordAnswer('${q.id}',true)"><span>True</span></label>
          <label style="flex:1;display:flex;gap:10px;padding:12px;border:1.5px solid var(--br);border-radius:8px;cursor:pointer;background:var(--ww);justify-content:center"><input type="radio" name="ans-${q.id}" value="false" onchange="recordAnswer('${q.id}',false)"><span>False</span></label>
        </div>`;
      } else if(q.type==="fib"){
        body=`<input id="ans-${q.id}" placeholder="Type your answer here..." oninput="recordAnswer('${q.id}',this.value)" style="margin-top:8px">`;
      } else if(q.type==="short"){
        body=`<textarea id="ans-${q.id}" rows="2" placeholder="Type your answer (1-2 sentences)..." oninput="recordAnswer('${q.id}',this.value)" style="margin-top:8px"></textarea>`;
      } else {
        body=`<textarea id="ans-${q.id}" rows="6" placeholder="Write your essay answer here..." oninput="recordAnswer('${q.id}',this.value)" style="margin-top:8px"></textarea>`;
      }
      return `<div class="panel"><p><strong>Q${i+1}.</strong> <span style="font-size:11px;color:var(--mt);margin-left:6px">${q.points} pt${q.points===1?"":"s"}</span></p><p style="margin-top:4px;font-size:15px">${escapeHtml(q.text)}</p>${body}</div>`;
    }).join("")}
    </div>
    <button class="btn btn-p btn-full" style="margin-top:20px;font-size:16px;padding:14px" onclick="submitTest(false)">📤 Submit Test</button>
  </div>`;
}
